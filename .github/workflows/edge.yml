name: Edge

on:
  push:
    paths:
      - "shingo-edge/**"
      - "protocol/**"
  pull_request:
    paths:
      - "shingo-edge/**"
      - "protocol/**"
  workflow_call:

# See core.yml for rationale - same idempotent burst-coalescing.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.0"

      - name: Build
        working-directory: shingo-edge
        run: go build ./...

      - name: Prepare build dir
        working-directory: shingo-edge
        run: mkdir -p build

      - name: Test (unit)
        working-directory: shingo-edge
        run: go test -coverprofile=build/coverage ./...

      - name: Test (unit, race)
        working-directory: shingo-edge
        # Promoted to gating in Phase 2 (2026-05-22) after the
        # baseline -race run was confirmed clean and PR 2's lock
        # fixes landed (sse_race_test.go, warlink_tags_race_test.go).
        run: go test -race -count=1 ./...

      - name: Coverage report (unit)
        working-directory: shingo-edge
        run: go tool cover -func=build/coverage

      - name: Test (Docker integration)
        working-directory: shingo-edge
        # testcontainers manages its own Postgres container; the
        # ubuntu-latest runner provides Docker. -count=1 prevents
        # stale-cache false positives on integration tests;
        # -timeout=10m accommodates cold-runner container startup.
        # TODO(stage-2a.2): tighten -timeout to ~2x the observed
        # runtime once the workflow has run a few times. Standard
        # warm-runner integration tests should land well under 5m;
        # 10m exists today only because we lack measured data.
        run: go test -tags=docker -timeout=10m -count=1 -coverprofile=build/coverage-docker ./...

      - name: Coverage report (Docker)
        working-directory: shingo-edge
        run: go tool cover -func=build/coverage-docker

      - name: Test (Docker integration, race)
        working-directory: shingo-edge
        # Promoted to gating in Phase 2 (2026-05-22) — see unit race
        # step above.
        run: go test -tags=docker -race -timeout=25m -count=1 ./...
