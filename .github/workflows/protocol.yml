name: Protocol

on:
  push:
    paths:
      - 'protocol/**'
  pull_request:
    paths:
      - 'protocol/**'
  workflow_call:

# See core.yml for rationale — same idempotent burst-coalescing.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'

      - name: Build
        working-directory: protocol
        run: go build ./...

      - name: Test
        working-directory: protocol
        run: go test ./... -v
