# shingocore.dev.yaml — LOCAL DEV / SIMULATION ONLY. NOT FOR PRODUCTION.
# Loaded by a shingocore built with -tags sim; the binary refuses to start
# unless SHINGO_ALLOW_SIM=1 (T0.3). Hosts are docker-compose service names;
# loopback enforcement lives in docker-compose.dev.yml port mappings (T0.4).
database:
  postgres:
    host: postgres
    port: 5432
    database: shingocore
    user: shingocore
    password: shingocore
    sslmode: disable

web:
  host: 0.0.0.0                      # bind inside container; compose maps to 127.0.0.1
  port: 8083
  session_secret: dev-only-not-a-real-secret

messaging:
  kafka:
    brokers:
      - kafka:9092
    group_id: shingocore
  orders_topic: shingo.orders
  dispatch_topic: shingo.dispatch
  # 500ms (sim): at 10× sim the plant inserts outbox rows far faster than the
  # PRODUCTION-paced 5s tick (batch 50 → ~10 msg/s ceiling) can drain, so ~150–200
  # time-sensitive order transitions sit pending (sent_at IS NULL) in steady state
  # and publish seconds late, stressing swap choreography. The drainer does one
  # batch per tick, so shortening the interval is the lever (batch size is fixed at
  # 50 in messaging.NewOutboxDrainer). 500ms × 50 = up to 100k msg/s headroom.
  outbox_drain_interval: 500ms
  station_id: core

# rds / count_groups / fire_alarm intentionally omitted — sim mode skips the RDS
# adapter and the count-group runner (T1.1). Defaults apply for anything else.

# Staging / reconciliation cadence. The sim has no human operator to confirm a
# produce/consume delivery, so `delivered` orders rely on the reconciliation
# sweep to auto-confirm them (delivered→confirmed = terminal). The PRODUCTION
# defaults (sweep_interval 5m, auto_confirm_delivered 5m) leave a produce relief's
# resupply leg (AutoConfirmA=false) sitting `delivered` — hence non-terminal — for
# up to 5 wall-minutes; meanwhile CanAcceptOrders reports "active order in progress"
# and blocks the next relief, so the output bin overfills past capacity and the
# cell stalls (the sim-plant-design.md §5 contract). Drive both short here so a
# delivery confirms within ~2s and the swap loop self-clears headlessly. Loaders/
# unloaders carry skip_auto_confirm and stay sim-operator-driven (CLEAR), so a
# short auto_confirm does not race them.
#
# abandon_stuck is DISABLED here (0s). In production a non-terminal order stuck past
# 1h is cancelled — a held swap removal leg, a robot parked at a staging node, real
# faults worth clearing. In the SIM that same sweep reaps orders that are merely
# waiting out a downtime outage: a press down past the depth of its supermarket's
# buffer starves the downstream weld, whose two-robot swap then holds its removal leg
# "until the supply sibling claims a bin" — and at 1h sim-time the sweep cancels it.
# Those show up as a churn of cancelled/failed orders that are sim artifacts, not
# plant problems. Off = the sim self-heals when the machine recovers, instead of
# abandoning the backlog. (Must be a duration string — bare `0` fails yaml→Duration.)
staging:
  sweep_interval: 2s            # wall-clock ticker for the reconciliation + staged-bin sweeps
  auto_confirm_delivered: 2s    # sim-clock age after which a stuck `delivered` order is confirmed
  abandon_stuck: 0s             # sim: disable the >1h stuck-order abandonment sweep (0 = off)
  # ttl (sim): finite staging expiry so lineside bins auto-unstage. The PRODUCTION
  # default is 0 (permanent — staged bins release only when a claim picks them).
  # In the sim that gridlocks: swap/complex deliveries land bins `staged` at lineside
  # nodes with staged_expires_at=NULL, the stagedBinSweepLoop skips NULL-expiry bins,
  # and if no claim grabs them they freeze staged forever — choking the node (6/9
  # machines idle, ~23/96 bins frozen, reconciliation "critical"). A finite TTL gives
  # the existing sweep (ReleaseExpiredStagedBins, every sweep_interval) a deadline to
  # act on, so a staged bin reverts to `available` if no claim picks it within 30s
  # (~3s wall at 10×). 30s is short enough to clear a stall, long enough that a bin
  # genuinely mid-swap (picked within 30s) isn't yanked.
  ttl: 30s

sim:
  enabled: true
  seed: 1                           # fixed for reproducible dev runs (0 = derive+log)
  speed: 10.0                       # time multiplier (running clock): 10× wall. Change live in the dev top-strip / POST /api/sim/speed. Set sim.epoch for fast-forward.
  # epoch: 2026-05-11T00:00:00Z     # FAST-FORWARD HISTORY: uncomment (set ~30d ago) + raise speed.
                                    # The clock starts in the past and catches up to wall-now, then runs 1× live —
                                    # generating ~a month of real dashboard history in a few hours.
  # anchor_wall: 2026-06-10T00:00:00Z  # SHARED wall anchor — set to the RUN-START wall time, IDENTICAL in core+edge.
                                    # Keeps the two fast-forward clocks in lockstep (sim-now = epoch + speed×(now−anchor));
                                    # without it core/edge drift by boot-skew × speed and cross-process messages expire,
                                    # stalling the swap loop. Both epoch AND anchor_wall MUST match edge. Rebuild after
                                    # editing (configs are baked into the image): docker compose build core edge.
  # Finite fleet + realistic transit. Production-plant scale: Springfield runs ~7
  # AMRs, Hopkinsville 10, at ~42–86% utilization (door-to-door ~0.1 m/s; median
  # two-robot weld occupancy ~855s). 5s transit made robots a non-constraint (1
  # erlang → any fleet works) and is unrealistic. This demo plant is denser than a
  # real one (27 swap-producing claims vs ~10-15 at a real plant), so it needs more
  # robots to stay fed: fleet 20 @ 45-60s transit. simcalc estimates ~12-16 erlang
  # of loaded-leg demand there; 20 robots targets ~0.7-0.8 util with headroom for
  # downtime bunching. Validated empirically: 12 @ 60-90s starved (queue_wait
  # mounted to 5h+, throughput ~0.7 orders/min). (simcalc overcounts vs real plants
  # — it models no robot reuse — so this is tuned to measured throughput, not the
  # raw estimator.)
  transit_min: 45s
  transit_max: 60s
  fleet_size: 20
  jitter_pct: 0.2
  fail_rate: 0.0
