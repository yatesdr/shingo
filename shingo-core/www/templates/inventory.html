{{define "content"}}
<div>
  <div class="flex flex-between mb-2">
    <h1>Inventory</h1>
    <div class="flex-center gap-1">
      <span id="row-count" class="text-muted text-sm"></span>
      {{if .Authenticated}}
      <button class="btn btn-primary btn-sm" data-action="exportInventory" id="export-btn" disabled>Export Excel</button>
      {{end}}
    </div>
  </div>

  <div class="filter-bar mb-1">
    <input type="text" id="inv-search" placeholder="Search..." data-action-input="applyFilters">
    <select id="inv-zone" data-action-change="applyFilters"><option value="">All Zones</option></select>
    <select id="inv-group" data-action-change="applyFilters"><option value="">All Groups</option></select>
    <select id="inv-status" data-action-change="applyFilters">
      <option value="">All Statuses</option>
      <option value="available">Available</option>
      <option value="staged">Staged</option>
      <option value="flagged">Flagged</option>
      <option value="maintenance">Maintenance</option>
      <option value="retired">Retired</option>
    </select>
    <label class="text-sm flex-center" style="gap:0.3rem;">
      <input type="checkbox" id="inv-transit" data-action-change="applyFilters"> In Transit
    </label>
  </div>

  <div id="inv-loading" class="loading-overlay">
    <div class="spinner"></div>
    <span>Loading inventory...</span>
  </div>

  <div id="inv-error" class="alert hide"></div>

  <div id="inv-table-wrap" class="hide">
    <div style="overflow-x:auto;">
      <table id="inv-table">
        <thead>
          <tr>
            <th class="sortable" data-col="group_name" data-action="sortBy:group_name">Group</th>
            <th class="sortable" data-col="lane_name" data-action="sortBy:lane_name">Lane</th>
            <th class="sortable" data-col="node_name" data-action="sortBy:node_name">Node</th>
            <th class="sortable" data-col="zone" data-action="sortBy:zone">Zone</th>
            <th class="sortable" data-col="bin_label" data-action="sortBy:bin_label">Bin</th>
            <th class="sortable" data-col="bin_type" data-action="sortBy:bin_type">Type</th>
            <th class="sortable" data-col="status" data-action="sortBy:status">Status</th>
            <th>Transit</th>
            <th class="sortable" data-col="payload_code" data-action="sortBy:payload_code">Payload</th>
            <th class="sortable" data-col="cat_id" data-action="sortBy:cat_id">Cat-ID</th>
            <th class="sortable" data-col="qty" data-action="sortBy:qty">Qty</th>
            <th>UOP Rem.</th>
            <th>Confirmed</th>
          </tr>
        </thead>
        <tbody id="inv-body"></tbody>
      </table>
    </div>
  </div>

  <div class="flex flex-between mb-1 mt-2">
    <h2>Lineside Buckets</h2>
    <span id="buckets-count" class="text-muted text-sm"></span>
  </div>
  <div id="buckets-table-wrap" style="overflow-x:auto;">
    <table id="buckets-table">
      <thead>
        <tr>
          <th>Cell</th>
          <th>Process</th>
          <th>Station</th>
          <th>Node</th>
          <th>Style</th>
          <th>Part</th>
          <th>State</th>
          <th style="text-align:right">Qty</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="buckets-body"></tbody>
    </table>
  </div>
</div>

<script type="module" src="/static/pages/inventory.js?v={{cacheBust}}"></script>
{{end}}
