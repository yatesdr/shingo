{{define "content"}}
<div>
  <h1 class="mb-2">Configuration</h1>

  {{if .Saved}}
  <div class="alert alert-ok mb-2">Settings saved ({{.Saved}}).</div>
  {{end}}

  <!-- Database -->
  <div class="card mb-2">
    <h3>Database</h3>
    <form method="POST" action="/config/save">
      <input type="hidden" name="section" value="database">
      <div>
        <div class="grid grid-3">
          <div class="form-group">
            <label>Host</label>
            <input type="text" name="pg_host" value="{{.Config.Database.Postgres.Host}}" placeholder="localhost">
          </div>
          <div class="form-group">
            <label>Port</label>
            <input type="number" name="pg_port" value="{{.Config.Database.Postgres.Port}}" placeholder="5432">
          </div>
          <div class="form-group">
            <label>Database</label>
            <input type="text" name="pg_database" value="{{.Config.Database.Postgres.Database}}" placeholder="shingocore">
          </div>
        </div>
        <div class="grid grid-3">
          <div class="form-group">
            <label>User</label>
            <input type="text" name="pg_user" value="{{.Config.Database.Postgres.User}}" placeholder="shingocore">
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" name="pg_password" value="{{.Config.Database.Postgres.Password}}" placeholder="">
          </div>
          <div class="form-group">
            <label>SSL Mode</label>
            <select name="pg_sslmode">
              <option value="disable" {{if eq .Config.Database.Postgres.SSLMode "disable"}}selected{{end}}>disable</option>
              <option value="require" {{if eq .Config.Database.Postgres.SSLMode "require"}}selected{{end}}>require</option>
              <option value="verify-ca" {{if eq .Config.Database.Postgres.SSLMode "verify-ca"}}selected{{end}}>verify-ca</option>
              <option value="verify-full" {{if eq .Config.Database.Postgres.SSLMode "verify-full"}}selected{{end}}>verify-full</option>
            </select>
          </div>
        </div>
        <div class="grid grid-3" style="margin-top: 0.5rem;">
          <div class="form-group">
            <label>Max Open Conns</label>
            <input type="number" name="pg_max_open_conns" value="{{if gt .Config.Database.Postgres.MaxOpenConns 0}}{{.Config.Database.Postgres.MaxOpenConns}}{{else}}25{{end}}" placeholder="25">
          </div>
          <div class="form-group">
            <label>Max Idle Conns</label>
            <input type="number" name="pg_max_idle_conns" value="{{if gt .Config.Database.Postgres.MaxIdleConns 0}}{{.Config.Database.Postgres.MaxIdleConns}}{{else}}10{{end}}" placeholder="10">
          </div>
          <div class="form-group">
            <label>Conn Max Lifetime</label>
            <input type="text" name="pg_conn_max_lifetime" value="{{if .Config.Database.Postgres.ConnMaxLifetime}}{{.Config.Database.Postgres.ConnMaxLifetime}}{{else}}5m0s{{end}}" placeholder="5m">
          </div>
        </div>
      </div>

      <button type="submit" class="btn btn-primary btn-sm">Save</button>
    </form>
  </div>

  <!-- General (Server Identity + Fleet combined) -->
  <div class="card mb-2">
    <h3>General</h3>
    <form method="POST" action="/config/save">
      <input type="hidden" name="section" value="general">
      <h4 class="mb-1">Fleet Backend</h4>
      <div class="grid grid-3">
        <div class="form-group">
          <label>Base URL</label>
          <input type="text" name="fleet_base_url" value="{{.Config.RDS.BaseURL}}" placeholder="http://192.168.1.100:8088">
        </div>
        <div class="form-group">
          <label>Poll Interval</label>
          <input type="text" name="fleet_poll_interval" value="{{.Config.RDS.PollInterval}}" placeholder="5s">
        </div>
        <div class="form-group">
          <label>Timeout</label>
          <input type="text" name="fleet_timeout" value="{{.Config.RDS.Timeout}}" placeholder="10s">
        </div>
      </div>
      <button type="submit" class="btn btn-primary btn-sm">Save</button>
    </form>
  </div>

  <!-- Services (Messaging) -->
  <div class="card mb-2">
    <h3>Services</h3>
    <form method="POST" action="/config/save">
      <input type="hidden" name="section" value="services">

      <!-- Messaging subsection -->
      <h4 class="mb-1">Messaging (Kafka)</h4>

      <label class="text-sm">Brokers</label>
      <div id="kafka-broker-rows">
        {{range $i, $b := .Config.Messaging.Kafka.Brokers}}
        {{$parts := splitBroker $b}}
        <div class="flex gap-1 mb-1 kafka-broker-row">
          <input type="text" name="kafka_host_{{$i}}" value="{{index $parts 0}}" placeholder="Host" style="flex:2">
          <input type="number" name="kafka_port_{{$i}}" value="{{index $parts 1}}" placeholder="9093" style="flex:1">
          <button type="button" class="btn btn-danger btn-sm" onclick="removeKafkaBroker(this)">-</button>
        </div>
        {{end}}
      </div>
      <button type="button" class="btn btn-sm mb-1" onclick="addKafkaBroker()">+ Add Broker</button>

      <div class="form-group mb-1">
        <label>Group ID</label>
        <input type="text" name="group_id" value="{{.Config.Messaging.Kafka.GroupID}}" placeholder="shingocore">
      </div>

      <h4 class="mb-1" style="margin-top:0.75rem; border-top:1px solid var(--border); padding-top:0.75rem">Topics</h4>
      <div class="grid grid-2">
        <div class="form-group">
          <label>Orders Topic</label>
          <input type="text" name="orders_topic" value="{{.Config.Messaging.OrdersTopic}}">
        </div>
        <div class="form-group">
          <label>Dispatch Topic</label>
          <input type="text" name="dispatch_topic" value="{{.Config.Messaging.DispatchTopic}}">
        </div>
      </div>

      <button type="submit" class="btn btn-primary btn-sm">Save</button>
    </form>
  </div>
</div>

<div id="page-data" data-broker-count="{{len .Config.Messaging.Kafka.Brokers}}"></div>
<script src="/static/pages/config.js"></script>
{{end}}
