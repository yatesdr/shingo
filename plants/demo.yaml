# demo.yaml v3 — press-driven plant, real swap modes (G3).
# LOCAL DEV / SIMULATION ONLY. NOT FOR PRODUCTION.
#
# Consumed by cmd/seeddev (loaded + validated via shingo-core/plantspec).
# Exercises every production swap mode the real plants use, driven headlessly by
# the sim fleet + auto-operator. See docs/dev-env/sim-plant-design.md for the
# swap-mode ↔ staging/pairing contract this spec is built against.
#
# NODE NAMING — docs/node-naming-standards.md ({TYPE}_{NNN}, underscores):
#   PLN press line | ALN assembly/weld line | SLN staging lane | SMN supermarket slot
#   UTN utility/return-bank slot | PLK pick/decant | FGN finished-goods exit
#   SYN_… NGRP group | Lane_NN lane. PLC/process/style names + bin labels are
#   separate namespaces (left readable).
#
# SWAP MODES EXERCISED (one per cell):
#   PRESS-1  two_robot_press_index  front PLN_001 + paired back PLN_002 (in-line index, no staging)
#   PRESS-2  sequential / A/B       PLN_003 (active) + PLN_004 (parked)  — two bins rotate, no staging
#   WELD-1   two_robot              consume + produce, inbound staging only
#   WELD-2   single_robot           consume + produce, DISTINCT inbound + outbound staging
#   WELD-3   two_robot consume + A/B produce (ALN_007 active + ALN_008 parked)
#   LOADER / UNLOADERs  manual_swap (operator/sim LOAD/CLEAR; no staging)
#
#   A/B (sequential) rotation is PLC-automated in real plants (FlipABNode on bin-full);
#   the sim must simulate that PLC bit. See the build log + sim_operator for the sim flip.
#
# MATERIAL FLOW (rate parity TUNED 2026-06-10; verify with `make dev-rates`):
#   PANEL-LH: PRESS-1 (12/min, 2× tick) → WELD-1 + WELD-3 (6+6)   ← press runs 2× to feed two cells
#   PANEL-RH: PRESS-2 (6) → WELD-2 (6)
#   BRKT:     LOADER (C-push) → WELD-2 (6)
#   ASSY-X:   WELD-1 + WELD-3 (6+6) → UNLOADER-A (drain)
#   ASSY-Y:   WELD-2 (6) → UNLOADER-B (drain)
# Tick rates live in shingoedge.dev.yaml (sim.processes[].tick_interval); A/B pairs
# (PRESS-2, WELD-3 produce) share ONE counter so they count 1×, not 2×.
#
# KEY DESIGN: each weld cell is ONE process with MULTIPLE claims (consume + produce);
# a counter tick fans to all its nodes, dispatching per claim.Role. A/B pairs share one
# process+style; active_pull arbitrates which bin counts/fills.
namespace: devplant
line_id: line1

bin_types: [STANDARD]

payloads:
  - {code: PANEL-LH, uop_capacity: 30, bin_type: STANDARD}
  - {code: PANEL-RH, uop_capacity: 30, bin_type: STANDARD}
  - {code: BRKT,     uop_capacity: 20, bin_type: STANDARD}
  - {code: ASSY-X,   uop_capacity: 20, bin_type: STANDARD}
  - {code: ASSY-Y,   uop_capacity: 20, bin_type: STANDARD}
  # De-confounded loader-test components: each gets its OWN payload + supermarket +
  # consumer loop so the three loader TYPES never compete on a pooled threshold (so
  # never-2N and "analytics counts == loads/unloads" are observable per loader).
  #   CLIP → PLK_X1 (SINGLE-WINDOW) loop      → UNLOADER-C
  #   STUD → PLK_DECK (DEDICATED, 2 positions) → UNLOADER-D
  # BRKT stays PLK_LOADER (MULTI-WINDOW) → WELD-2, now the only BRKT loader.
  - {code: CLIP,     uop_capacity: 20, bin_type: STANDARD}
  - {code: STUD,     uop_capacity: 20, bin_type: STANDARD}
  # Two FULL new component lines (no shortcuts) so each loader feeds a real cell AND each
  # cell feeds a real unloader: PRESS-3→PANEL-C→WELD-4(PANEL-C+CLIP)→ASSY-C→UNLOADER-C,
  # PRESS-4→PANEL-D→WELD-5(PANEL-D+STUD)→ASSY-D→UNLOADER-D.
  - {code: PANEL-C,  uop_capacity: 30, bin_type: STANDARD}
  - {code: PANEL-D,  uop_capacity: 30, bin_type: STANDARD}
  - {code: ASSY-C,   uop_capacity: 20, bin_type: STANDARD}
  - {code: ASSY-D,   uop_capacity: 20, bin_type: STANDARD}

# Storage — deep multi-slot lanes (ASRS). depth 1 = lane mouth (accessible), higher =
# buried. retrieve=FIFO + store=LKND: payloads self-segregate into lanes, FIFO reshuffles
# to the oldest buried bin once a lane mouth is refilled. Empty carriers live in
# SYN_MT_Return, never in supermarket lanes. Oversized so the loop can't lock on space.
zones:
  - name: SYN_SM_Stamp
    retrieve_algorithm: FIFO
    store_algorithm: LKND
    lanes:
      # Lane_01 = PANEL-LH source (seeded full); Lane_02/03 = PANEL-RH source (full)
      - {name: Lane_01, slots: [{name: SMN_001, depth: 1}, {name: SMN_002, depth: 2}, {name: SMN_003, depth: 3}]}
      - {name: Lane_02, slots: [{name: SMN_004, depth: 1}, {name: SMN_005, depth: 2}, {name: SMN_006, depth: 3}]}
      - {name: Lane_03, slots: [{name: SMN_007, depth: 1}, {name: SMN_008, depth: 2}, {name: SMN_009, depth: 3}]}
      # Lane_04/05 = open (presses store full panels here; LKND overflow)
      - {name: Lane_04, slots: [{name: SMN_010, depth: 1}, {name: SMN_011, depth: 2}, {name: SMN_012, depth: 3}]}
      - {name: Lane_05, slots: [{name: SMN_013, depth: 1}, {name: SMN_014, depth: 2}, {name: SMN_015, depth: 3}]}
      # Reshuffle buffer: shallow depth-1 lanes that stay empty under LKND (deep
      # lanes fill first). A FIFO buried-bin retrieve needs up to 2 free shuffle
      # slots to unbury; these guarantee that room so the zone can't deadlock at
      # capacity. Keep FIFO + the seeded buried-oldest ASRS test intact.
      - {name: Lane_24, slots: [{name: SMN_034, depth: 1}]}
      - {name: Lane_25, slots: [{name: SMN_035, depth: 1}]}
      - {name: Lane_26, slots: [{name: SMN_036, depth: 1}]}
      - {name: Lane_27, slots: [{name: SMN_037, depth: 1}]}
  - name: SYN_SM_Comp
    retrieve_algorithm: FIFO
    store_algorithm: LKND
    lanes:
      - {name: Lane_06, slots: [{name: SMN_016, depth: 1}, {name: SMN_017, depth: 2}, {name: SMN_018, depth: 3}]}
      - {name: Lane_07, slots: [{name: SMN_019, depth: 1}, {name: SMN_020, depth: 2}, {name: SMN_021, depth: 3}]}
  - name: SYN_SM_FG
    retrieve_algorithm: FIFO
    store_algorithm: LKND
    lanes:
      - {name: Lane_08, slots: [{name: SMN_022, depth: 1}, {name: SMN_023, depth: 2}, {name: SMN_024, depth: 3}]}
      - {name: Lane_09, slots: [{name: SMN_025, depth: 1}, {name: SMN_026, depth: 2}, {name: SMN_027, depth: 3}]}
      - {name: Lane_10, slots: [{name: SMN_028, depth: 1}, {name: SMN_029, depth: 2}, {name: SMN_030, depth: 3}]}
      - {name: Lane_11, slots: [{name: SMN_031, depth: 1}, {name: SMN_032, depth: 2}, {name: SMN_033, depth: 3}]}
      # Reshuffle buffer (see SYN_SM_Stamp) — FG fills as welds + FASTLINE produce
      # ASSY; keep depth-1 headroom so unloader retrieves never deadlock the lanes.
      - {name: Lane_28, slots: [{name: SMN_038, depth: 1}]}
      - {name: Lane_29, slots: [{name: SMN_039, depth: 1}]}
      - {name: Lane_30, slots: [{name: SMN_040, depth: 1}]}
  - name: SYN_MT_Return
    retrieve_algorithm: FIFO
    store_algorithm: DPTH
    lanes:
      - {name: Lane_12, slots: [{name: UTN_001, depth: 1}, {name: UTN_002, depth: 2}, {name: UTN_003, depth: 3}, {name: UTN_004, depth: 4}]}
      - {name: Lane_13, slots: [{name: UTN_005, depth: 1}, {name: UTN_006, depth: 2}, {name: UTN_007, depth: 3}, {name: UTN_008, depth: 4}]}
      - {name: Lane_14, slots: [{name: UTN_009, depth: 1}, {name: UTN_010, depth: 2}, {name: UTN_011, depth: 3}, {name: UTN_012, depth: 4}]}
      - {name: Lane_15, slots: [{name: UTN_013, depth: 1}, {name: UTN_014, depth: 2}, {name: UTN_015, depth: 3}, {name: UTN_016, depth: 4}]}
      - {name: Lane_16, slots: [{name: UTN_017, depth: 1}, {name: UTN_018, depth: 2}, {name: UTN_019, depth: 3}, {name: UTN_020, depth: 4}]}
      - {name: Lane_17, slots: [{name: UTN_021, depth: 1}, {name: UTN_022, depth: 2}, {name: UTN_023, depth: 3}, {name: UTN_024, depth: 4}]}
      - {name: Lane_18, slots: [{name: UTN_025, depth: 1}, {name: UTN_026, depth: 2}, {name: UTN_027, depth: 3}, {name: UTN_028, depth: 4}]}
      - {name: Lane_19, slots: [{name: UTN_029, depth: 1}, {name: UTN_030, depth: 2}, {name: UTN_031, depth: 3}, {name: UTN_032, depth: 4}]}
      - {name: Lane_20, slots: [{name: UTN_033, depth: 1}, {name: UTN_034, depth: 2}, {name: UTN_035, depth: 3}, {name: UTN_036, depth: 4}]}
      - {name: Lane_21, slots: [{name: UTN_037, depth: 1}, {name: UTN_038, depth: 2}, {name: UTN_039, depth: 3}, {name: UTN_040, depth: 4}]}
      - {name: Lane_22, slots: [{name: UTN_041, depth: 1}, {name: UTN_042, depth: 2}, {name: UTN_043, depth: 3}, {name: UTN_044, depth: 4}]}
      - {name: Lane_23, slots: [{name: UTN_045, depth: 1}, {name: UTN_046, depth: 2}, {name: UTN_047, depth: 3}, {name: UTN_048, depth: 4}]}
      # Extra return-bank capacity for the two new lines (more empties cycling).
      - {name: Lane_42, slots: [{name: UTN_049, depth: 1}, {name: UTN_050, depth: 2}, {name: UTN_051, depth: 3}, {name: UTN_052, depth: 4}]}
      - {name: Lane_43, slots: [{name: UTN_053, depth: 1}, {name: UTN_054, depth: 2}, {name: UTN_055, depth: 3}, {name: UTN_056, depth: 4}]}
  # Dedicated-loader BUFFER (step 7). A FIFO node group that stages empties to rotate into a
  # PLK_DECK position on threshold AND parks changeover-orphaned partials. FIFO retrieve =
  # oldest-first, so a parked partial (the older bin) is consumed before a fresh empty
  # automatically — no partial-first logic. Wired as PLK_DECK.buffer_dest on the
  # dedicated-loader claims below, AND as UNLOADER-D's outbound: PLK_DECK sources its
  # threshold-fill empties FROM here, and UNLOADER-D returns the CLEAN empties it strips off
  # drained ASSY-D INTO here — empties cycle unloader->buffer->position, distinct from the
  # far return bank. (A consume node's evac would park payload-bearing partials that inflate
  # the loader's stock count, so the unloader is the empty source, not WELD-5.) 6 slots =
  # cycling empties + evac headroom.
  - name: SYN_BUF_Deck
    retrieve_algorithm: FIFO
    store_algorithm: DPTH
    lanes:
      - {name: Lane_31, slots: [{name: BUF_001, depth: 1}, {name: BUF_002, depth: 2}, {name: BUF_003, depth: 3}, {name: BUF_004, depth: 4}, {name: BUF_005, depth: 5}, {name: BUF_006, depth: 6}]}
  # Isolated component supermarkets so each loader's loop is independently observable
  # (de-confound, per the test-rig fix). The loader stores fulls here; the matching
  # unloader drains them, dropping system UOP so the loader's threshold re-trips —
  # a self-cycling, threshold-gated, single-payload loop (no cross-talk with BRKT).
  - name: SYN_SM_Clip
    retrieve_algorithm: FIFO
    store_algorithm: LKND
    lanes:
      - {name: Lane_32, slots: [{name: SMN_041, depth: 1}, {name: SMN_042, depth: 2}, {name: SMN_043, depth: 3}]}
      - {name: Lane_33, slots: [{name: SMN_044, depth: 1}]}   # reshuffle headroom
  - name: SYN_SM_Stud
    retrieve_algorithm: FIFO
    store_algorithm: LKND
    lanes:
      - {name: Lane_34, slots: [{name: SMN_045, depth: 1}, {name: SMN_046, depth: 2}, {name: SMN_047, depth: 3}]}
      - {name: Lane_35, slots: [{name: SMN_048, depth: 1}]}
  # New-line panel supermarkets (PRESS-3/4 output) and finished-goods supermarkets
  # (WELD-4/5 output, drained by UNLOADER-C/D).
  - name: SYN_SM_StampC
    retrieve_algorithm: FIFO
    store_algorithm: LKND
    lanes:
      - {name: Lane_36, slots: [{name: SMN_049, depth: 1}, {name: SMN_050, depth: 2}, {name: SMN_051, depth: 3}]}
  - name: SYN_SM_StampD
    retrieve_algorithm: FIFO
    store_algorithm: LKND
    lanes:
      - {name: Lane_37, slots: [{name: SMN_052, depth: 1}, {name: SMN_053, depth: 2}, {name: SMN_054, depth: 3}]}
  - name: SYN_SM_FGC
    retrieve_algorithm: FIFO
    store_algorithm: LKND
    lanes:
      - {name: Lane_38, slots: [{name: SMN_055, depth: 1}, {name: SMN_056, depth: 2}, {name: SMN_057, depth: 3}]}
  - name: SYN_SM_FGD
    retrieve_algorithm: FIFO
    store_algorithm: LKND
    lanes:
      - {name: Lane_39, slots: [{name: SMN_058, depth: 1}, {name: SMN_059, depth: 2}, {name: SMN_060, depth: 3}]}

stations:
  # ── PRESS-1: two_robot_press_index (front + paired back, no staging) ──
  - {name: PLN_001, kind: press}     # PRESS-1 front (produce PANEL-LH)
  - {name: PLN_002, kind: press}     # PRESS-1 back / paired position (no own claim)
  # ── PRESS-2: A/B sequential (two bins rotate, no staging) ──
  - {name: PLN_003, kind: press}     # PRESS-2 A (active)  produce PANEL-RH
  - {name: PLN_004, kind: press}     # PRESS-2 B (parked)  produce PANEL-RH
  # ── WELD-1: two_robot (inbound staging only) ──
  - {name: ALN_001, kind: weld}      # WELD-1 consume PANEL-LH
  - {name: ALN_002, kind: weld}      # WELD-1 produce ASSY-X
  - {name: SLN_001, kind: staging}   # WELD-1 ALN_001 inbound stage
  - {name: SLN_002, kind: staging}   # WELD-1 ALN_002 inbound stage
  # ── WELD-2: single_robot (DISTINCT inbound + outbound staging per node) ──
  - {name: ALN_003, kind: weld}      # WELD-2 consume PANEL-RH
  - {name: ALN_004, kind: weld}      # WELD-2 consume BRKT
  - {name: ALN_005, kind: weld}      # WELD-2 produce ASSY-Y
  - {name: SLN_003, kind: staging}   # WELD-2 ALN_003 inbound
  - {name: SLN_004, kind: staging}   # WELD-2 ALN_003 outbound
  - {name: SLN_005, kind: staging}   # WELD-2 ALN_004 inbound
  - {name: SLN_006, kind: staging}   # WELD-2 ALN_004 outbound
  - {name: SLN_007, kind: staging}   # WELD-2 ALN_005 inbound
  - {name: SLN_008, kind: staging}   # WELD-2 ALN_005 outbound
  # ── WELD-3: two_robot consume + A/B produce ──
  - {name: ALN_006, kind: weld}      # WELD-3 consume PANEL-LH (two_robot)
  - {name: ALN_007, kind: weld}      # WELD-3 produce ASSY-X  A (active, A/B)
  - {name: ALN_008, kind: weld}      # WELD-3 produce ASSY-X  B (parked, A/B)
  - {name: SLN_009, kind: staging}   # WELD-3 ALN_006 inbound stage
  # ── Loader + unloaders (manual_swap) ──
  # PLK_LOADER is a SHARED multi-window BRKT loader. Its identity (PLK_LOADER) is a
  # synthetic label, NOT a node — there is no phantom anchor that never receives a
  # bin. Its three windows below are its only physical nodes: each is a delivery
  # target AND its own operator HMI. The loader is declared by the window_of claims
  # (no anchor claim); the seed derives its config from the windows' shared claim.
  - {name: PLK_W1, kind: loader}     # PLK_LOADER window 1
  - {name: PLK_W2, kind: loader}     # PLK_LOADER window 2
  - {name: PLK_W3, kind: loader}     # PLK_LOADER window 3
  # Loader-TYPE coverage (each TYPE seeded so all three are exercisable):
  #   PLK_LOADER = MULTI-WINDOW (shared, 3 windows, above)
  #   PLK_X1     = SINGLE-WINDOW (one real node, its own anchor — the classic shape)
  #   PLK_DECK   = DEDICATED-POSITIONS (PLK_D1+PLK_D2, both BRKT = same-payload-two-position)
  - {name: PLK_X1, kind: loader}     # single-window CLIP loader (own loop → UNLOADER-C)
  - {name: PLK_D1, kind: loader}     # PLK_DECK dedicated position 1 (STUD)
  - {name: PLK_D2, kind: loader}     # PLK_DECK dedicated position 2 (STUD, same payload)
  - {name: FGN_001, kind: unloader}  # ASSY-X finished-goods exit
  - {name: FGN_002, kind: unloader}  # ASSY-Y finished-goods exit
  # ── New CLIP line: PRESS-3 → WELD-4 (PANEL-C + CLIP → ASSY-C) → UNLOADER-C ──
  # Gives the SINGLE-WINDOW loader PLK_X1 a real cell to feed AND a real unloader downstream.
  - {name: PLN_005, kind: press}     # PRESS-3 front (produce PANEL-C)
  - {name: PLN_006, kind: press}     # PRESS-3 paired back (index)
  - {name: ALN_009, kind: weld}      # WELD-4 consume PANEL-C
  - {name: SLN_010, kind: staging}   # WELD-4 ALN_009 inbound stage
  - {name: ALN_010, kind: weld}      # WELD-4 consume CLIP (fed by PLK_X1)
  - {name: SLN_011, kind: staging}   # WELD-4 ALN_010 inbound stage
  - {name: ALN_011, kind: weld}      # WELD-4 produce ASSY-C
  - {name: SLN_012, kind: staging}   # WELD-4 ALN_011 inbound stage
  - {name: FGN_003, kind: unloader}  # UNLOADER-C drains ASSY-C
  # ── New STUD line: PRESS-4 → WELD-5 (PANEL-D + STUD → ASSY-D) → UNLOADER-D ──
  # Gives the DEDICATED loader PLK_DECK a real cell to feed AND a real unloader downstream.
  - {name: PLN_007, kind: press}     # PRESS-4 front (produce PANEL-D)
  - {name: PLN_008, kind: press}     # PRESS-4 paired back (index)
  - {name: ALN_012, kind: weld}      # WELD-5 consume PANEL-D
  - {name: SLN_013, kind: staging}   # WELD-5 ALN_012 inbound stage
  - {name: ALN_013, kind: weld}      # WELD-5 consume STUD (fed by PLK_DECK)
  - {name: SLN_014, kind: staging}   # WELD-5 ALN_013 inbound stage
  - {name: ALN_014, kind: weld}      # WELD-5 produce ASSY-D
  - {name: SLN_015, kind: staging}   # WELD-5 ALN_014 inbound stage
  - {name: FGN_004, kind: unloader}  # UNLOADER-D drains ASSY-D

# Bins. Source lanes seeded FULL back-to-front (buried bins exist from t0). Produce nodes
# (incl. A/B parked sides + press-index back) seeded with EMPTY active carriers. Consume
# nodes seeded above reorder so flow establishes before the first reorder. Empties pool in
# SYN_MT_Return. Bin LABELS are a separate namespace from node names.
bins:
  # --- SYN_SM_Stamp source: Lane_01 full (3 LH), Lane_02+03 full (6 RH) ---
  - {name: BIN-LH-01, slot: SMN_001, payload: PANEL-LH, uop: 30}   # mouth
  - {name: BIN-LH-02, slot: SMN_002, payload: PANEL-LH, uop: 30}   # buried (depth 2)
  - {name: BIN-LH-03, slot: SMN_003, payload: PANEL-LH, uop: 30, age_s: 3600}  # buried (depth 3) + OLDEST → FIFO must reshuffle to it (ASRS test)
  - {name: BIN-RH-01, slot: SMN_004, payload: PANEL-RH, uop: 30}
  - {name: BIN-RH-02, slot: SMN_005, payload: PANEL-RH, uop: 30}
  - {name: BIN-RH-03, slot: SMN_006, payload: PANEL-RH, uop: 30}
  - {name: BIN-RH-04, slot: SMN_007, payload: PANEL-RH, uop: 30}
  - {name: BIN-RH-05, slot: SMN_008, payload: PANEL-RH, uop: 30}
  - {name: BIN-RH-06, slot: SMN_009, payload: PANEL-RH, uop: 30}
  # --- SYN_SM_Comp source: Lane_06 seeded light (1 BRKT) so the PLK_001 loader's
  # C-push trips within a few minutes instead of after draining a deep buffer ---
  - {name: BIN-BRKT-01, slot: SMN_016, payload: BRKT, uop: 20}
  # De-confounded component supermarkets seeded light (1 bin each) so the loaders' C-push
  # trips quickly: PLK_X1→CLIP→SYN_SM_Clip→WELD-1, PLK_DECK→STUD→SYN_SM_Stud→WELD-3.
  - {name: BIN-CLIP-01, slot: SMN_041, payload: CLIP, uop: 20}
  - {name: BIN-STUD-01, slot: SMN_045, payload: STUD, uop: 20}
  # New-line panel supermarkets seeded light (1 bin each) so WELD-4/5 have initial runway.
  - {name: BIN-PC-01,   slot: SMN_049, payload: PANEL-C, uop: 30}
  - {name: BIN-PD-01,   slot: SMN_052, payload: PANEL-D, uop: 30}
  # --- Active produce bins (empty → fill → swap) ---
  - {name: BIN-ACT-P1F, slot: PLN_001}   # PRESS-1 front (filling)
  - {name: BIN-ACT-P1B, slot: PLN_002}   # PRESS-1 back (staged empty, indexes to front)
  - {name: BIN-ACT-P2A, slot: PLN_003}   # PRESS-2 A active (filling)
  - {name: BIN-ACT-P2B, slot: PLN_004}   # PRESS-2 B parked (ready)
  - {name: BIN-ACT-W1,  slot: ALN_002}   # WELD-1 ASSY-X output
  - {name: BIN-ACT-W2,  slot: ALN_005}   # WELD-2 ASSY-Y output
  - {name: BIN-ACT-W3A, slot: ALN_007}   # WELD-3 ASSY-X output A active
  - {name: BIN-ACT-W3B, slot: ALN_008}   # WELD-3 ASSY-X output B parked
  # --- Active consume bins (seeded above reorder) ---
  - {name: BIN-ACT-W1-LH,   slot: ALN_001, payload: PANEL-LH, uop: 15}
  - {name: BIN-ACT-W2-RH,   slot: ALN_003, payload: PANEL-RH, uop: 15}
  - {name: BIN-ACT-W2-BRKT, slot: ALN_004, payload: BRKT, uop: 12}
  - {name: BIN-ACT-W3-LH,   slot: ALN_006, payload: PANEL-LH, uop: 15}
  # New CLIP line active bins (PRESS-3 index pair + WELD-4 consume PANEL-C/CLIP + produce ASSY-C)
  - {name: BIN-ACT-P3F,    slot: PLN_005}                            # PRESS-3 front (filling)
  - {name: BIN-ACT-P3B,    slot: PLN_006}                            # PRESS-3 back (staged empty)
  - {name: BIN-ACT-W4-PC,  slot: ALN_009, payload: PANEL-C, uop: 20} # WELD-4 PANEL-C consume
  - {name: BIN-ACT-W4-CL,  slot: ALN_010, payload: CLIP, uop: 15}    # WELD-4 CLIP consume (from PLK_X1)
  - {name: BIN-ACT-W4,     slot: ALN_011}                            # WELD-4 ASSY-C output (empty carrier)
  # New STUD line active bins (PRESS-4 index pair + WELD-5 consume PANEL-D/STUD + produce ASSY-D)
  - {name: BIN-ACT-P4F,    slot: PLN_007}                            # PRESS-4 front (filling)
  - {name: BIN-ACT-P4B,    slot: PLN_008}                            # PRESS-4 back (staged empty)
