# plants/demo.yaml — the local-dev/sim demo plant.
#
# A small, self-running circular loop with REALISTIC SHARED MARKETS: a few depth-3 FIFO
# supermarkets that hold multiple payloads (LKND store self-segregates by payload, so one
# shared market gives each component its own lane), drive dynamic reshuffling, and stay
# rate-balanced so nothing starves or pins full. Goal: exercise each swap mode + a
# multi-window loader, a single-window loader, and an unloader, and FIRE RESHUFFLE
# reliably across the shared markets. See .claude/plans/demo-shared-markets-and-liveliness.md.
#
# MAIN CIRCLE (stamp → weld → finished goods):
#   PRESS-1 (PANEL-A, two_robot_press_index) ─┐
#   PRESS-2 (PANEL-B, sequential A/B)        ├─→ SYN_SM_Stamp (shared, PANEL-A + PANEL-B) ─→ WELD-1 (PANEL-A→ASSY)
#                                            ┘                                            ─→ WELD-2 (PANEL-B→ASSY)
#   PLK_LOADER (BRKT, multi-window) ─┐
#   PLK_X1     (CLIP, single-window) ├─→ SYN_SM_Comp (shared, BRKT + CLIP + STUD) ─→ WELD-2 (BRKT), WELD-3 (CLIP), WELD-4 (STUD)
#   PLK_X2     (STUD, single-window) ┘                                                ↓
#                                                                                     ↓ SYN_SM_FG (ASSY)
#                                            UNLOADER-A (drains ASSY) ──────────────→ SYN_MT_Return (empties cycle back)
#
# Shared markets = shared inventory + dynamic reshuffling: a CLIP retrieve can reshuffle
# past a buried BRKT bin in the same market, and the multi-payload lanes exercise the
# LKND self-segregation that real plants rely on.
#
# Rates (anti-starvation): each PLC ticks 1 UOP/tick at 10s (6/min). Each press feeds one
# weld at the same rate → the market is pure decoupling headroom, mid-level, no jam/no
# starve. Component legs are loader-fed; each consume weld drains its market at 6/min,
# keeping the loaders re-tripping. Verify with `make dev-rates`.

namespace: devplant
line_id: line1

bin_types: [STANDARD]

payloads:
  - {code: PANEL-A, uop_capacity: 30, bin_type: STANDARD}
  - {code: PANEL-B, uop_capacity: 30, bin_type: STANDARD}
  - {code: BRKT,     uop_capacity: 40, bin_type: STANDARD}
  - {code: CLIP,     uop_capacity: 40, bin_type: STANDARD}
  - {code: STUD,     uop_capacity: 40, bin_type: STANDARD}
  - {code: ASSY,     uop_capacity: 20, bin_type: STANDARD}

# Storage — a few SHARED, UNIFORM depth-3 FIFO supermarkets ("cubes"). Every lane in a
# market is the same depth; there are no special shallow "buffer" lanes. Shuffle room for
# a buried-bin unbury comes from natural turnover: LKND store packs deepest-first
# (candidateBetter prefers deeper), so lane MOUTHS (depth 1) empty last and findShuffleSlots
# Pass 2 walks those empty mouths across the zone. A uniform grid also rides out the 85%
# downtime variance better than tiny buffers. LKND self-segregates by payload, so a shared
# market with N lanes cleanly holds N payloads; extra lanes are shared turnover headroom.
# Empty carriers live in SYN_MT_Return, never in supermarket lanes.
zones:
  # Stamping supermarket — PANEL-A + PANEL-B + 1 turnover lane, all depth-3. The reshuffle zone.
  # COMBINED MARKET (SB 2026-07-12): empties + partials + fulls all live in ONE mixed-fill
  # market, self-segregated by payload under LKND (same mechanism the shared component market
  # already used). Kills the empty/full split that stranded partials in the old SYN_MT_Return.
  # Producers retrieve empties (payload_code=""), consumers retrieve their material -- all from
  # this one group. UNTESTED (no sim run per SB). Watch: enough lanes for 7 payload segments
  # (PANEL-A/B, BRKT, CLIP, STUD, ASSY, empty) to self-segregate + leave reshuffle headroom.
  - name: SYN_MARKET
    retrieve_algorithm: FIFO
    store_algorithm: LKND
    lanes:
      # Lane_01 = PANEL-A, seeded full (3 bins). Depth-3 bin backdated oldest → FIFO must
      # reshuffle to it once the mouth drains (the headline reshuffle driver).
      - {name: Lane_01, slots: [{name: SMN_001, depth: 1}, {name: SMN_002, depth: 2}, {name: SMN_003, depth: 3}]}
      # Lane_02 = PANEL-B, seeded full (3 bins). Buried bins from t0 → reshuffle recurs.
      - {name: Lane_02, slots: [{name: SMN_004, depth: 1}, {name: SMN_005, depth: 2}, {name: SMN_006, depth: 3}]}
      # Lane_03 = turnover headroom (stays mostly empty under LKND → guaranteed shuffle room).
      - {name: Lane_03, slots: [{name: SMN_007, depth: 1}, {name: SMN_008, depth: 2}, {name: SMN_009, depth: 3}]}
      # Lane_15/16 = extra empty turnover headroom (reshuffle room — panels jammed w/o enough
      # shuffle slots; empty mouths let findShuffleSlots Pass 2 unbury without air bubbles).
      - {name: Lane_15, slots: [{name: SMN_031, depth: 1}, {name: SMN_032, depth: 2}, {name: SMN_033, depth: 3}]}
      - {name: Lane_16, slots: [{name: SMN_034, depth: 1}, {name: SMN_035, depth: 2}, {name: SMN_036, depth: 3}]}
  # SHARED Component supermarket — BRKT + CLIP + STUD + 1 turnover lane, all depth-3.
  # This is the shared-inventory / dynamic-reshuffle market: any component retrieve can
  # reshuffle past a buried bin of a DIFFERENT component in the same market.
      # -- components (folded from SYN_SM_Comp into SYN_MARKET) --
      - {name: Lane_04, slots: [{name: SMN_010, depth: 1}, {name: SMN_011, depth: 2}, {name: SMN_012, depth: 3}]}   # BRKT
      - {name: Lane_05, slots: [{name: SMN_013, depth: 1}, {name: SMN_014, depth: 2}, {name: SMN_015, depth: 3}]}   # CLIP
      - {name: Lane_06, slots: [{name: SMN_016, depth: 1}, {name: SMN_017, depth: 2}, {name: SMN_018, depth: 3}]}   # STUD
      - {name: Lane_07, slots: [{name: SMN_019, depth: 1}, {name: SMN_020, depth: 2}, {name: SMN_021, depth: 3}]}   # turnover
  # Finished-goods supermarket — ASSY. 1 lane depth-3: ASSY is egress (unloader drains it),
  # so it doesn't need deep buffer — 3 lanes was oversized. Freed nodes go to the tight markets.
      # -- finished-goods ASSY (folded from SYN_SM_FG into SYN_MARKET) --
      - {name: Lane_08, slots: [{name: SMN_022, depth: 1}, {name: SMN_023, depth: 2}, {name: SMN_024, depth: 3}]}
  # Empty-carrier return bank. Empties cycle unloader→here→press/loader. 4 lanes all depth-3,
  # DPTH store (fill shallow-first) so the mouth is the next empty picked.
      # -- empties/returns (folded from SYN_MT_Return into SYN_MARKET; now LKND like the rest) --
      - {name: Lane_11, slots: [{name: UTN_001, depth: 1}, {name: UTN_002, depth: 2}, {name: UTN_003, depth: 3}]}
      - {name: Lane_12, slots: [{name: UTN_004, depth: 1}, {name: UTN_005, depth: 2}, {name: UTN_006, depth: 3}]}
      - {name: Lane_13, slots: [{name: UTN_007, depth: 1}, {name: UTN_008, depth: 2}, {name: UTN_009, depth: 3}]}
      - {name: Lane_14, slots: [{name: UTN_010, depth: 1}, {name: UTN_011, depth: 2}, {name: UTN_012, depth: 3}]}
      # Lane_19 = extra empty headroom so returned empties don't leave air bubbles behind.
      - {name: Lane_19, slots: [{name: UTN_013, depth: 1}, {name: UTN_014, depth: 2}, {name: UTN_015, depth: 3}]}

stations:
  # ── PRESS-1: two_robot_press_index (front + paired back, no staging) ──
  - {name: PLN_001, kind: press}     # PRESS-1 front (produce PANEL-A)
  - {name: PLN_002, kind: press}     # PRESS-1 back / paired index position (no own claim)
  # ── PRESS-2: A/B sequential (two bins rotate, no staging) ──
  - {name: PLN_003, kind: press}     # PRESS-2 A (active)  produce PANEL-B
  - {name: PLN_004, kind: press}     # PRESS-2 B (parked)  produce PANEL-B
  # ── WELD-1: two_robot (inbound + outbound staging) ──
  - {name: ALN_001, kind: weld}      # WELD-1 consume PANEL-A
  - {name: ALN_002, kind: weld}      # WELD-1 produce ASSY
  - {name: SLN_001, kind: staging}   # WELD-1 ALN_001 inbound stage
  - {name: SLN_002, kind: staging}   # WELD-1 ALN_002 inbound stage
  - {name: SLN_011, kind: staging}   # WELD-1 ALN_001 OUTBOUND stage (two_robot removal leg)
  # ── WELD-2: single_robot (consume PANEL-B + BRKT, produce ASSY) ──
  - {name: ALN_003, kind: weld}      # WELD-2 consume PANEL-B
  - {name: ALN_004, kind: weld}      # WELD-2 consume BRKT
  - {name: ALN_005, kind: weld}      # WELD-2 produce ASSY
  - {name: SLN_003, kind: staging}   # WELD-2 ALN_003 inbound
  - {name: SLN_004, kind: staging}   # WELD-2 ALN_003 outbound
  - {name: SLN_005, kind: staging}   # WELD-2 ALN_004 inbound
  - {name: SLN_006, kind: staging}   # WELD-2 ALN_004 outbound
  - {name: SLN_007, kind: staging}   # WELD-2 ALN_005 inbound
  - {name: SLN_008, kind: staging}   # WELD-2 ALN_005 outbound
  # ── WELD-3: two_robot consume CLIP (single-window loader leg's drain) ──
  - {name: ALN_006, kind: weld}      # WELD-3 consume CLIP
  - {name: SLN_009, kind: staging}   # WELD-3 ALN_006 inbound stage
  - {name: SLN_012, kind: staging}   # WELD-3 ALN_006 OUTBOUND stage (two_robot removal leg)
  # ── WELD-4: two_robot consume STUD (second single-window loader leg's drain) ──
  - {name: ALN_007, kind: weld}      # WELD-4 consume STUD
  - {name: SLN_010, kind: staging}   # WELD-4 ALN_007 inbound stage
  - {name: SLN_013, kind: staging}   # WELD-4 ALN_007 OUTBOUND stage (two_robot removal leg)
  # ── Loaders (manual_swap): one multi-window + two single-window ──
  # PLK_LOADER is a SHARED MULTI-WINDOW BRKT loader (synthetic identity — not a node; its
  # two windows below are its only physical nodes, each a delivery target + its own HMI).
  - {name: PLK_W1, kind: loader}     # PLK_LOADER window 1
  - {name: PLK_W2, kind: loader}     # PLK_LOADER window 2
  # PLK_X1 / PLK_X2 = SINGLE-WINDOW loaders (each its own real-node anchor, the classic
  # single-node shape). CLIP and STUD each flow through one.
  - {name: PLK_X1, kind: loader}     # single-window CLIP loader
  - {name: PLK_X2, kind: loader}     # single-window STUD loader
  # ── Unloader ──
  - {name: FGN_001, kind: unloader}  # drains ASSY finished goods

# Bins. Source lanes seeded FULL back-to-front (buried bins exist from t0). Produce nodes
# (incl. A/B parked side + press-index back) seeded with EMPTY active carriers. Consume
# nodes seeded ABOVE reorder so flow establishes before the first reorder. Empties pool in
# SYN_MT_Return. Bin LABELS are a separate namespace from node names.
bins:
  # --- SYN_SM_Stamp: Lane_01 full (3 PANEL-A), Lane_02 full (3 PANEL-B) ---
  - {name: BIN-PA-01, slot: SMN_001, payload: PANEL-A, uop: 30}                          # Lane_01 mouth
  - {name: BIN-PA-02, slot: SMN_002, payload: PANEL-A, uop: 30}                          # Lane_01 buried (depth 2)
  - {name: BIN-PA-03, slot: SMN_003, payload: PANEL-A, uop: 30, age_s: 3600}             # Lane_01 buried (depth 3) + OLDEST → FIFO must reshuffle to it
  - {name: BIN-PB-01, slot: SMN_004, payload: PANEL-B, uop: 30}                          # Lane_02 mouth
  - {name: BIN-PB-02, slot: SMN_005, payload: PANEL-B, uop: 30}                          # Lane_02 buried (depth 2)
  - {name: BIN-PB-03, slot: SMN_006, payload: PANEL-B, uop: 30, age_s: 1800}             # Lane_02 buried (depth 3), 2nd-oldest
  # --- SYN_SM_Comp: lanes seeded FULL 3-deep (like the panel lanes) so the shared component
  #     market keeps depth while bins are in transit / checked out at cells — otherwise the
  #     market empties, supply legs can't claim, and the removal-hold stalls the whole side. ---
  - {name: BIN-BRKT-01, slot: SMN_010, payload: BRKT, uop: 40}                           # Lane_04 mouth (BRKT)
  - {name: BIN-BRKT-02, slot: SMN_011, payload: BRKT, uop: 40}                           # Lane_04 buried (depth 2)
  - {name: BIN-BRKT-03, slot: SMN_012, payload: BRKT, uop: 40}                           # Lane_04 buried (depth 3)
  - {name: BIN-CLIP-01, slot: SMN_013, payload: CLIP, uop: 40}                           # Lane_05 mouth (CLIP)
  - {name: BIN-CLIP-02, slot: SMN_014, payload: CLIP, uop: 40}                           # Lane_05 buried (depth 2)
  - {name: BIN-CLIP-03, slot: SMN_015, payload: CLIP, uop: 40}                           # Lane_05 buried (depth 3)
  - {name: BIN-STUD-01, slot: SMN_016, payload: STUD, uop: 40}                           # Lane_06 mouth (STUD)
  - {name: BIN-STUD-02, slot: SMN_017, payload: STUD, uop: 40}                           # Lane_06 buried (depth 2)
  - {name: BIN-STUD-03, slot: SMN_018, payload: STUD, uop: 40}                           # Lane_06 buried (depth 3)
  # --- Active produce bins (empty → fill → swap) ---
  - {name: BIN-ACT-P1F, slot: PLN_001}   # PRESS-1 front (filling)
  - {name: BIN-ACT-P1B, slot: PLN_002}   # PRESS-1 back (staged empty, indexes to front)
  - {name: BIN-ACT-P2A, slot: PLN_003}   # PRESS-2 A active (filling)
  - {name: BIN-ACT-P2B, slot: PLN_004}   # PRESS-2 B parked (empty, ready)
  - {name: BIN-ACT-W1,  slot: ALN_002}   # WELD-1 ASSY output (empty carrier)
  - {name: BIN-ACT-W2,  slot: ALN_005}   # WELD-2 ASSY output (empty carrier)
  # --- Active consume bins (seeded above reorder so flow establishes before first reorder) ---
  - {name: BIN-ACT-W1-PA, slot: ALN_001, payload: PANEL-A, uop: 25}   # WELD-1 PANEL-A consume (above reorder 15 → no startup-instant-reorder zombie)
  - {name: BIN-ACT-W2-PB, slot: ALN_003, payload: PANEL-B, uop: 25}   # WELD-2 PANEL-B consume (above reorder 15)
  - {name: BIN-ACT-W2-BR, slot: ALN_004, payload: BRKT,     uop: 40}  # WELD-2 BRKT consume
  - {name: BIN-ACT-W3-CL, slot: ALN_006, payload: CLIP,     uop: 40}  # WELD-3 CLIP consume
  - {name: BIN-ACT-W4-ST, slot: ALN_007, payload: STUD,     uop: 40}  # WELD-4 STUD consume
  # --- Empty carriers in SYN_MT_Return (prime the pump: presses + loaders draw from here) ---
  - {name: BIN-MT-01, slot: UTN_001}
  - {name: BIN-MT-02, slot: UTN_002}
  - {name: BIN-MT-03, slot: UTN_003}
  - {name: BIN-MT-04, slot: UTN_004}
  - {name: BIN-MT-05, slot: UTN_005}
  - {name: BIN-MT-06, slot: UTN_006}
  - {name: BIN-MT-07, slot: UTN_007}
  - {name: BIN-MT-08, slot: UTN_008}
  - {name: BIN-MT-09, slot: UTN_009}
  - {name: BIN-MT-10, slot: UTN_010}
  - {name: BIN-MT-11, slot: UTN_011}
  - {name: BIN-MT-12, slot: UTN_012}

processes:
  - {name: PRESS-1, active_style: PRESS-1-RUN}        # two_robot_press_index → PANEL-A
  - {name: PRESS-2, active_style: PRESS-2-RUN}        # A/B sequential → PANEL-B
  - {name: WELD-1,  active_style: WELD-1-RUN}         # two_robot: PANEL-A → ASSY
  - {name: WELD-2,  active_style: WELD-2-RUN}         # single_robot: PANEL-B + BRKT → ASSY
  - {name: WELD-3,  active_style: WELD-3-RUN}         # two_robot consume CLIP (single-window loader leg)
  - {name: WELD-4,  active_style: WELD-4-RUN}         # two_robot consume STUD (second single-window loader leg)
  - {name: LOADER-COMP, active_style: LOADER-COMP-RUN}   # manual_swap multi-window BRKT (no PLC; sim-operator-driven)
  - {name: LOADER-CLIP, active_style: LOADER-CLIP-RUN}   # manual_swap single-window CLIP
  - {name: LOADER-STUD, active_style: LOADER-STUD-RUN}   # manual_swap single-window STUD
  - {name: UNLOADER-A, active_style: UNLOADER-A-RUN}  # drains ASSY (main circle)
  # Loaders have no single station — their windows/positions are per-node operator stations
  # (PLK_W1/2-OPS, PLK_X1-OPS, PLK_X2-OPS), declared via operator_station on the claims below.

styles:
  - {name: PRESS-1-RUN,    process: PRESS-1,    payload: PANEL-A}
  - {name: PRESS-2-RUN,    process: PRESS-2,    payload: PANEL-B}
  - {name: WELD-1-RUN,     process: WELD-1,     payload: ASSY}
  - {name: WELD-2-RUN,     process: WELD-2,     payload: ASSY}
  - {name: WELD-3-RUN,     process: WELD-3,     payload: CLIP}
  - {name: WELD-4-RUN,     process: WELD-4,     payload: STUD}
  - {name: LOADER-COMP-RUN, process: LOADER-COMP, payload: BRKT}
  - {name: LOADER-CLIP-RUN, process: LOADER-CLIP, payload: CLIP}
  - {name: LOADER-STUD-RUN, process: LOADER-STUD, payload: STUD}
  - {name: UNLOADER-A-RUN, process: UNLOADER-A, payload: ASSY}

operator_stations: [PRESS-1-OPS, PRESS-2-OPS, WELD-1-OPS, WELD-2-OPS, WELD-3-OPS, WELD-4-OPS, PLK_W1-OPS, PLK_W2-OPS, PLK_X1-OPS, PLK_X2-OPS, UNLOADER-A-OPS]

claims:
  # ── PRESS-1 (two_robot_press_index): one claim on the front node, paired back ──
  - core_node: PLN_001
    style: PRESS-1-RUN
    role: produce
    swap_mode: two_robot_press_index
    payload: PANEL-A
    uop_capacity: 30
    auto_reorder: true
    paired_core_node: PLN_002
    inbound_source: SYN_MARKET
    outbound_destination: SYN_MARKET

  # ── PRESS-2 (A/B sequential): two paired claims, A active / B parked ──
  - core_node: PLN_003
    style: PRESS-2-RUN
    role: produce
    swap_mode: sequential
    payload: PANEL-B
    uop_capacity: 30
    auto_reorder: true
    paired_core_node: PLN_004
    inbound_source: SYN_MARKET
    outbound_destination: SYN_MARKET
  - core_node: PLN_004
    style: PRESS-2-RUN
    role: produce
    swap_mode: sequential
    payload: PANEL-B
    uop_capacity: 30
    auto_reorder: true
    paired_core_node: PLN_003
    active_pull: false
    inbound_source: SYN_MARKET
    outbound_destination: SYN_MARKET

  # ── WELD-1 (two_robot): consume PANEL-A + produce ASSY ──
  - core_node: ALN_001
    style: WELD-1-RUN
    role: consume
    swap_mode: two_robot
    payload: PANEL-A
    uop_capacity: 30
    reorder_point: 15
    auto_reorder: true
    inbound_source: SYN_MARKET
    outbound_destination: SYN_MARKET
    inbound_staging: SLN_001
    outbound_staging: SLN_011
  - core_node: ALN_002
    style: WELD-1-RUN
    role: produce
    swap_mode: two_robot
    payload: ASSY
    uop_capacity: 20
    auto_reorder: true
    inbound_source: SYN_MARKET
    outbound_destination: SYN_MARKET
    inbound_staging: SLN_002

  # ── WELD-2 (single_robot): consume PANEL-B + BRKT, produce ASSY ──
  - core_node: ALN_003
    style: WELD-2-RUN
    role: consume
    swap_mode: single_robot
    payload: PANEL-B
    uop_capacity: 30
    reorder_point: 15
    auto_reorder: true
    inbound_source: SYN_MARKET
    outbound_destination: SYN_MARKET
    inbound_staging: SLN_003
    outbound_staging: SLN_004
  - core_node: ALN_004
    style: WELD-2-RUN
    role: consume
    swap_mode: single_robot
    payload: BRKT
    uop_capacity: 40
    reorder_point: 25
    auto_reorder: true
    inbound_source: SYN_MARKET
    outbound_destination: SYN_MARKET
    inbound_staging: SLN_005
    outbound_staging: SLN_006
  - core_node: ALN_005
    style: WELD-2-RUN
    role: produce
    swap_mode: single_robot
    payload: ASSY
    uop_capacity: 20
    auto_reorder: true
    inbound_source: SYN_MARKET
    outbound_destination: SYN_MARKET
    inbound_staging: SLN_007
    outbound_staging: SLN_008

  # ── WELD-3 (two_robot): consume CLIP from the shared Comp market ──
  - core_node: ALN_006
    style: WELD-3-RUN
    role: consume
    swap_mode: two_robot
    payload: CLIP
    uop_capacity: 40
    reorder_point: 25
    auto_reorder: true
    inbound_source: SYN_MARKET
    outbound_destination: SYN_MARKET
    inbound_staging: SLN_009
    outbound_staging: SLN_012

  # ── WELD-4 (two_robot): consume STUD from the shared Comp market ──
  - core_node: ALN_007
    style: WELD-4-RUN
    role: consume
    swap_mode: two_robot
    payload: STUD
    uop_capacity: 40
    reorder_point: 25
    auto_reorder: true
    inbound_source: SYN_MARKET
    outbound_destination: SYN_MARKET
    inbound_staging: SLN_010
    outbound_staging: SLN_013

  # ── PLK_LOADER (manual_swap, MULTI-WINDOW): BRKT → SYN_SM_Comp ──
  # No anchor claim — synthetic identity. Each window declares window_of: PLK_LOADER; the
  # seed builds ONE shared_window loader keyed on PLK_LOADER with the windows as homes.
  # Each window pins its OWN operator station (per-window-HMI).
  - {core_node: PLK_W1, style: LOADER-COMP-RUN, role: produce, swap_mode: manual_swap, payload: BRKT, uop_capacity: 40, reorder_point: 2, auto_reorder: true, inbound_source: SYN_MARKET, outbound_destination: SYN_MARKET, window_of: PLK_LOADER, operator_station: PLK_W1-OPS}
  - {core_node: PLK_W2, style: LOADER-COMP-RUN, role: produce, swap_mode: manual_swap, payload: BRKT, uop_capacity: 40, reorder_point: 2, auto_reorder: true, inbound_source: SYN_MARKET, outbound_destination: SYN_MARKET, window_of: PLK_LOADER, operator_station: PLK_W2-OPS}

  # ── PLK_X1 (manual_swap, SINGLE-WINDOW): CLIP → SYN_SM_Comp ──
  - {core_node: PLK_X1, style: LOADER-CLIP-RUN, role: produce, swap_mode: manual_swap, payload: CLIP, uop_capacity: 40, reorder_point: 2, auto_reorder: true, inbound_source: SYN_MARKET, outbound_destination: SYN_MARKET, operator_station: PLK_X1-OPS}

  # ── PLK_X2 (manual_swap, SINGLE-WINDOW): STUD → SYN_SM_Comp ──
  - {core_node: PLK_X2, style: LOADER-STUD-RUN, role: produce, swap_mode: manual_swap, payload: STUD, uop_capacity: 40, reorder_point: 2, auto_reorder: true, inbound_source: SYN_MARKET, outbound_destination: SYN_MARKET, operator_station: PLK_X2-OPS}

  # ── UNLOADER-A (manual_swap: pull full ASSY, return empty) ──
  - core_node: FGN_001
    style: UNLOADER-A-RUN
    role: consume
    swap_mode: manual_swap
    payload: ASSY
    uop_capacity: 20
    reorder_point: 0
    auto_reorder: false
    inbound_source: SYN_MARKET
    outbound_destination: SYN_MARKET
    auto_push: true

demands:
  # Loader demands key on the loader identity (synthetic PLK_LOADER, or the single-window
  # anchor node). The seed derives demand_registry from the loader aggregate; these
  # thresholds stamp onto each loader's payload/home UOPThreshold. ~2 bins worth each.
  - {payload: BRKT, node: PLK_LOADER, replenish_uop_threshold: 40}
  - {payload: CLIP, node: PLK_X1, replenish_uop_threshold: 40}
  - {payload: STUD, node: PLK_X2, replenish_uop_threshold: 40}
  # Unloader is event/auto-push driven (informational threshold 0).
  - {payload: ASSY, node: FGN_001, replenish_uop_threshold: 0}

# Reporting points: one PLC counter per counting process (manual_swap excluded).
# plc_name/tag_name MUST match sim.processes in shingoedge.dev.yaml. The tick fans
# to all nodes of the active (process, style); for A/B it follows active_pull.
reporting_points:
  - {plc_name: PRESS-1, tag_name: PRESS-1_COUNTER, node: PLN_001, style: PRESS-1-RUN}
  - {plc_name: PRESS-2, tag_name: PRESS-2_COUNTER, node: PLN_003, style: PRESS-2-RUN}
  - {plc_name: WELD-1,  tag_name: WELD-1_COUNTER,  node: ALN_001, style: WELD-1-RUN}
  - {plc_name: WELD-2,  tag_name: WELD-2_COUNTER,  node: ALN_003, style: WELD-2-RUN}
  - {plc_name: WELD-3,  tag_name: WELD-3_COUNTER,  node: ALN_006, style: WELD-3-RUN}
  - {plc_name: WELD-4,  tag_name: WELD-4_COUNTER,  node: ALN_007, style: WELD-4-RUN}

cell_configs:
  - {process: PRESS-1, station: PRESS-1-OPS}
  - {process: PRESS-2, station: PRESS-2-OPS}
  - {process: WELD-1,  station: WELD-1-OPS}
  - {process: WELD-2,  station: WELD-2-OPS}
  - {process: WELD-3,  station: WELD-3-OPS}
  - {process: WELD-4,  station: WELD-4-OPS}
  - {process: UNLOADER-A, station: UNLOADER-A-OPS}
  # Loaders have no single cell station — their windows are per-node operator stations
  # (PLK_W1/2-OPS, PLK_X1-OPS, PLK_X2-OPS), declared via operator_station above.
