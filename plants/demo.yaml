  - {name: UNLOADER-D-RUN, process: UNLOADER-D, payload: ASSY-D}

# PLK_LOADER has no single station — each window is its own operator HMI (per-window
# model), declared via operator_station on the window claims above.
operator_stations: [PRESS-1-OPS, PRESS-2-OPS, PRESS-3-OPS, PRESS-4-OPS, WELD-1-OPS, WELD-2-OPS, WELD-3-OPS, WELD-4-OPS, WELD-5-OPS, PLK_W1-OPS, PLK_W2-OPS, PLK_W3-OPS, PLK_X1-OPS, PLK_D1-OPS, PLK_D2-OPS, UNLOADER-A-OPS, UNLOADER-B-OPS, UNLOADER-C-OPS, UNLOADER-D-OPS]

claims:
  # ── PRESS-1 (two_robot_press_index): one claim on the front node, paired back ──
  - core_node: PLN_001
    style: PRESS-1-RUN
    role: produce
    swap_mode: two_robot_press_index
    payload: PANEL-LH
    uop_capacity: 30
    auto_reorder: true
    paired_core_node: PLN_002
    inbound_source: SYN_MT_Return
    outbound_destination: SYN_SM_Stamp

  # ── PRESS-2 (A/B sequential): two paired claims, A active / B parked ──
  - core_node: PLN_003
    style: PRESS-2-RUN
    role: produce
    swap_mode: sequential
    payload: PANEL-RH
    uop_capacity: 30
    auto_reorder: true
    paired_core_node: PLN_004
    inbound_source: SYN_MT_Return
    outbound_destination: SYN_SM_Stamp
  - core_node: PLN_004
    style: PRESS-2-RUN
    role: produce
    swap_mode: sequential
    payload: PANEL-RH
    uop_capacity: 30
    auto_reorder: true
    paired_core_node: PLN_003
    active_pull: false
    inbound_source: SYN_MT_Return
    outbound_destination: SYN_SM_Stamp

  # ── WELD-1 (two_robot): inbound staging only ──
  - core_node: ALN_001
    style: WELD-1-RUN
    role: consume
    swap_mode: two_robot
    payload: PANEL-LH
    uop_capacity: 30
    reorder_point: 8
    auto_reorder: true
    inbound_source: SYN_SM_Stamp
    outbound_destination: SYN_MT_Return
    inbound_staging: SLN_001
  - core_node: ALN_002
    style: WELD-1-RUN
    role: produce
    swap_mode: two_robot
    payload: ASSY-X
    uop_capacity: 20
    auto_reorder: true
    inbound_source: SYN_MT_Return
    outbound_destination: SYN_SM_FG
    inbound_staging: SLN_002

  # ── WELD-2 (single_robot): DISTINCT inbound + outbound staging per node ──
  - core_node: ALN_003
    style: WELD-2-RUN
    role: consume
    swap_mode: single_robot
    payload: PANEL-RH
    uop_capacity: 30
    reorder_point: 8
    auto_reorder: true
    inbound_source: SYN_SM_Stamp
    outbound_destination: SYN_MT_Return
    inbound_staging: SLN_003
    outbound_staging: SLN_004
  - core_node: ALN_004
    style: WELD-2-RUN
    role: consume
    swap_mode: single_robot
    payload: BRKT
    uop_capacity: 20
    reorder_point: 5
    auto_reorder: true
    inbound_source: SYN_SM_Comp
    outbound_destination: SYN_MT_Return
    inbound_staging: SLN_005
    outbound_staging: SLN_006
  - core_node: ALN_005
    style: WELD-2-RUN
    role: produce
    swap_mode: single_robot
    payload: ASSY-Y
    uop_capacity: 20
    auto_reorder: true
    inbound_source: SYN_MT_Return
    outbound_destination: SYN_SM_FG
    inbound_staging: SLN_007
    outbound_staging: SLN_008

  # ── WELD-3 (two_robot consume + A/B produce) ──
  - core_node: ALN_006
    style: WELD-3-RUN
    role: consume
    swap_mode: two_robot
    payload: PANEL-LH
    uop_capacity: 30
    reorder_point: 8
    auto_reorder: true
    inbound_source: SYN_SM_Stamp
    outbound_destination: SYN_MT_Return
    inbound_staging: SLN_009
  - core_node: ALN_007
    style: WELD-3-RUN
    role: produce
    swap_mode: sequential
    payload: ASSY-X
    uop_capacity: 20
    auto_reorder: true
    paired_core_node: ALN_008
    inbound_source: SYN_MT_Return
    outbound_destination: SYN_SM_FG
  - core_node: ALN_008
    style: WELD-3-RUN
    role: produce
    swap_mode: sequential
    payload: ASSY-X
    uop_capacity: 20
    auto_reorder: true
    paired_core_node: ALN_007
    active_pull: false
    inbound_source: SYN_MT_Return
    outbound_destination: SYN_SM_FG

  # ── PLK_LOADER (manual_swap, multi-window) ──
  # No anchor claim — the loader has no physical anchor node. Each window declares
  # window_of: PLK_LOADER, so the seed builds ONE shared_window loader keyed on the
  # synthetic id PLK_LOADER, derives its config (role/payload/source/dest) from these
  # claims, and adds the three windows as its homes. Each window still gets a Core
  # node + Edge process_node (these claims) so empties can be delivered to it. The
  # BRKT demand keys on PLK_LOADER (below), not on any window.
  # Each window pins itself to its OWN operator station (operator_station) — the
  # per-window-HMI model: one physical screen per window, so an operator loads the
  # bin in front of them with no window-picker and no misload.
  - {core_node: PLK_W1, style: LOADER-COMP-RUN, role: produce, swap_mode: manual_swap, payload: BRKT, uop_capacity: 20, reorder_point: 2, auto_reorder: true, inbound_source: SYN_MT_Return, outbound_destination: SYN_SM_Comp, window_of: PLK_LOADER, operator_station: PLK_W1-OPS}
  - {core_node: PLK_W2, style: LOADER-COMP-RUN, role: produce, swap_mode: manual_swap, payload: BRKT, uop_capacity: 20, reorder_point: 2, auto_reorder: true, inbound_source: SYN_MT_Return, outbound_destination: SYN_SM_Comp, window_of: PLK_LOADER, operator_station: PLK_W2-OPS}
  - {core_node: PLK_W3, style: LOADER-COMP-RUN, role: produce, swap_mode: manual_swap, payload: BRKT, uop_capacity: 20, reorder_point: 2, auto_reorder: true, inbound_source: SYN_MT_Return, outbound_destination: SYN_SM_Comp, window_of: PLK_LOADER, operator_station: PLK_W3-OPS}

  # ── PLK_X1 (manual_swap, SINGLE-WINDOW): its own real-node loader — no window_of/home_of, so
  # the seed builds a shared_window loader anchored at PLK_X1 (the classic single-node shape;
  # step 1 materialises its anchor as a window member). Its OWN CLIP loop (→ SYN_SM_Clip, drained
  # by UNLOADER-C) so single-window never-2N + analytics are observable in isolation (de-confound). ──
  - {core_node: PLK_X1, style: LOADER-CLIP-RUN, role: produce, swap_mode: manual_swap, payload: CLIP, uop_capacity: 20, reorder_point: 2, auto_reorder: true, inbound_source: SYN_MT_Return, outbound_destination: SYN_SM_Clip, operator_station: PLK_X1-OPS}

  # ── PLK_DECK (manual_swap, DEDICATED-POSITIONS): two STUD positions = same-payload-two-position ──
  # home_of: PLK_DECK groups both positions into one dedicated_positions loader keyed on the
  # synthetic id PLK_DECK. Each position is its own demand_registry row + delivery target +
  # operator HMI; the pooled STUD threshold trips and the (step-3) member-aware ReservationTarget
  # routes the empty to the position the signal names. Its OWN STUD loop (→ SYN_SM_Stud, drained by
  # UNLOADER-D) isolates the O2 routing watch. buffer_dest = SYN_BUF_Deck (step-7 buffer).
  - {core_node: PLK_D1, style: LOADER-STUD-RUN, role: produce, swap_mode: manual_swap, payload: STUD, uop_capacity: 20, reorder_point: 2, auto_reorder: true, inbound_source: SYN_MT_Return, outbound_destination: SYN_SM_Stud, buffer_dest: SYN_BUF_Deck, home_of: PLK_DECK, operator_station: PLK_D1-OPS}
  - {core_node: PLK_D2, style: LOADER-STUD-RUN, role: produce, swap_mode: manual_swap, payload: STUD, uop_capacity: 20, reorder_point: 2, auto_reorder: true, inbound_source: SYN_MT_Return, outbound_destination: SYN_SM_Stud, buffer_dest: SYN_BUF_Deck, home_of: PLK_DECK, operator_station: PLK_D2-OPS}

  # ── UNLOADER-A (manual_swap: pull full ASSY-X, return empty) ──
  - core_node: FGN_001
    style: UNLOADER-A-RUN
    role: consume
    swap_mode: manual_swap
    payload: ASSY-X
    uop_capacity: 20
    reorder_point: 0
    auto_reorder: false
    inbound_source: SYN_SM_FG
    outbound_destination: SYN_MT_Return
    auto_push: true

  # ── UNLOADER-B (manual_swap: pull full ASSY-Y, return empty) ──
  - core_node: FGN_002
    style: UNLOADER-B-RUN
    role: consume
    swap_mode: manual_swap
    payload: ASSY-Y
    uop_capacity: 20
    reorder_point: 0
    auto_reorder: false
    inbound_source: SYN_SM_FG
    outbound_destination: SYN_MT_Return
    auto_push: true

  # ── CLIP LINE: PRESS-3 → WELD-4 (PANEL-C + CLIP → ASSY-C) → UNLOADER-C ──
  # The single-window loader PLK_X1 feeds CLIP into WELD-4; UNLOADER-C drains ASSY-C.
  - core_node: PLN_005
    style: PRESS-3-RUN
    role: produce
    swap_mode: two_robot_press_index
    payload: PANEL-C
    uop_capacity: 30
    auto_reorder: true
    paired_core_node: PLN_006
    inbound_source: SYN_MT_Return
    outbound_destination: SYN_SM_StampC
  - core_node: ALN_009
    style: WELD-4-RUN
    role: consume
    swap_mode: two_robot
    payload: PANEL-C
    uop_capacity: 30
    reorder_point: 8
    auto_reorder: true
    inbound_source: SYN_SM_StampC
    outbound_destination: SYN_MT_Return
    inbound_staging: SLN_010
  - core_node: ALN_010
    style: WELD-4-RUN
    role: consume
    swap_mode: two_robot
    payload: CLIP
    uop_capacity: 20
    reorder_point: 5
    auto_reorder: true
    inbound_source: SYN_SM_Clip
    outbound_destination: SYN_MT_Return
    inbound_staging: SLN_011
  - core_node: ALN_011
    style: WELD-4-RUN
    role: produce
    swap_mode: two_robot
    payload: ASSY-C
    uop_capacity: 20
    auto_reorder: true
    inbound_source: SYN_MT_Return
    outbound_destination: SYN_SM_FGC
    inbound_staging: SLN_012
  - core_node: FGN_003
    style: UNLOADER-C-RUN
    role: consume
    swap_mode: manual_swap
    payload: ASSY-C
    uop_capacity: 20
    reorder_point: 0
    auto_reorder: false
    inbound_source: SYN_SM_FGC
    outbound_destination: SYN_MT_Return
    auto_push: true

  # ── STUD LINE: PRESS-4 → WELD-5 (PANEL-D + STUD → ASSY-D) → UNLOADER-D ──
  # The dedicated loader PLK_DECK feeds STUD into WELD-5; UNLOADER-D drains ASSY-D.
  - core_node: PLN_007
    style: PRESS-4-RUN
    role: produce
    swap_mode: two_robot_press_index
    payload: PANEL-D
    uop_capacity: 30
    auto_reorder: true
    paired_core_node: PLN_008
    inbound_source: SYN_MT_Return
    outbound_destination: SYN_SM_StampD
  - core_node: ALN_012
    style: WELD-5-RUN
    role: consume
    swap_mode: two_robot
    payload: PANEL-D
    uop_capacity: 30
    reorder_point: 8
    auto_reorder: true
    inbound_source: SYN_SM_StampD
    outbound_destination: SYN_MT_Return
    inbound_staging: SLN_013
  - core_node: ALN_013
    style: WELD-5-RUN
    role: consume
    swap_mode: two_robot
    payload: STUD
    uop_capacity: 20
    reorder_point: 5
    auto_reorder: true
    inbound_source: SYN_SM_Stud
    outbound_destination: SYN_MT_Return
    inbound_staging: SLN_014
  - core_node: ALN_014
    style: WELD-5-RUN
    role: produce
    payload: ASSY-D
    swap_mode: two_robot
    uop_capacity: 20
    auto_reorder: true
    inbound_source: SYN_MT_Return
    outbound_destination: SYN_SM_FGD
    inbound_staging: SLN_015
  - core_node: FGN_004
    style: UNLOADER-D-RUN
    role: consume
    swap_mode: manual_swap
    payload: ASSY-D
    uop_capacity: 20
    reorder_point: 0
    auto_reorder: false
    inbound_source: SYN_SM_FGD
    # step-7 buffer loop: UNLOADER-D drains ASSY-D and returns the CLEAN empty (uop 0, no
    # payload) into the dedicated loader's buffer (SYN_BUF_Deck), NOT the far return bank.
    # PLK_DECK re-sources that empty from the buffer on its next STUD threshold fill, so
    # empties cycle unloader->buffer->position. (A consume node's evac would park payload-
    # bearing partials that inflate the loader's stock count, so the unloader — not WELD-5 —
    # is the clean-empty source.)
    outbound_destination: SYN_BUF_Deck
    auto_push: true

# Demand registry. LOADER-COMP C-push on BRKT; unloaders informational.
# BRKT threshold is set high (80 UOP ≈ 4 bins at capacity 20) so a dip pulls the
# loader's whole 3-window budget at once — the multi-window spread + never-2N cap
# are both visible in one reservation. Demand keys on the loader identity PLK_LOADER
# (a synthetic id, not a node); its windows PLK_W1/2/3 are delivery targets, not
# separate demand points.
demands:
  # MULTI-WINDOW: BRKT keys on the synthetic loader id PLK_LOADER (windows PLK_W1/2/3 are
  # delivery targets, not demand points). High threshold (80 ≈ 4 bins) so a dip pulls the
  # whole 3-window budget — multi-window spread + never-2N both visible in one reservation.
  - {payload: BRKT, node: PLK_LOADER, replenish_uop_threshold: 80}
  # SINGLE-WINDOW: CLIP keys on PLK_X1 (its own real-node loader) — its own isolated loop.
  - {payload: CLIP, node: PLK_X1, replenish_uop_threshold: 80}
  # DEDICATED same-payload-two-position: per-position STUD rows. Both trip on the pooled STUD
  # count; the step-3 member-aware fix routes each empty to the position the signal names (O2).
  - {payload: STUD, node: PLK_D1, replenish_uop_threshold: 80}
  - {payload: STUD, node: PLK_D2, replenish_uop_threshold: 80}
  # Unloaders are event/auto-push driven (informational threshold 0).
  - {payload: ASSY-X, node: FGN_001, replenish_uop_threshold: 0}
  - {payload: ASSY-Y, node: FGN_002, replenish_uop_threshold: 0}

# Reporting points: one PLC counter per counting process (manual_swap excluded).
# plc_name/tag_name MUST match sim.processes in shingoedge.dev.yaml. The tick fans
# to all nodes of the active (process, style); for A/B it follows active_pull.
reporting_points:
  - {plc_name: PRESS-1, tag_name: PRESS-1_COUNTER, node: PLN_001, style: PRESS-1-RUN}
  - {plc_name: PRESS-2, tag_name: PRESS-2_COUNTER, node: PLN_003, style: PRESS-2-RUN}
  - {plc_name: WELD-1, tag_name: WELD-1_COUNTER, node: ALN_001, style: WELD-1-RUN}
  - {plc_name: WELD-2, tag_name: WELD-2_COUNTER, node: ALN_003, style: WELD-2-RUN}
  - {plc_name: WELD-3, tag_name: WELD-3_COUNTER, node: ALN_006, style: WELD-3-RUN}
  - {plc_name: PRESS-3, tag_name: PRESS-3_COUNTER, node: PLN_005, style: PRESS-3-RUN}
  - {plc_name: PRESS-4, tag_name: PRESS-4_COUNTER, node: PLN_007, style: PRESS-4-RUN}
  - {plc_name: WELD-4, tag_name: WELD-4_COUNTER, node: ALN_009, style: WELD-4-RUN}
  - {plc_name: WELD-5, tag_name: WELD-5_COUNTER, node: ALN_012, style: WELD-5-RUN}

cell_configs:
