processes:
  - {name: PRESS-1, active_style: PRESS-1-RUN}        # two_robot_press_index
  - {name: PRESS-2, active_style: PRESS-2-RUN}        # A/B sequential
  - {name: PRESS-3, active_style: PRESS-3-RUN}        # PANEL-C for the CLIP line
  - {name: PRESS-4, active_style: PRESS-4-RUN}        # PANEL-D for the STUD line
  - {name: WELD-1, active_style: WELD-1-RUN}          # two_robot
  - {name: WELD-2, active_style: WELD-2-RUN}          # single_robot
  - {name: WELD-3, active_style: WELD-3-RUN}          # two_robot consume + A/B produce
  - {name: WELD-4, active_style: WELD-4-RUN}          # PANEL-C + CLIP → ASSY-C (CLIP line)
  - {name: WELD-5, active_style: WELD-5-RUN}          # PANEL-D + STUD → ASSY-D (STUD line)
  - {name: LOADER-COMP, active_style: LOADER-COMP-RUN}   # BRKT, multi-window PLK_LOADER
  - {name: LOADER-CLIP, active_style: LOADER-CLIP-RUN}   # CLIP, single-window PLK_X1
  - {name: LOADER-STUD, active_style: LOADER-STUD-RUN}   # STUD, dedicated PLK_DECK
  - {name: UNLOADER-A, active_style: UNLOADER-A-RUN}
  - {name: UNLOADER-B, active_style: UNLOADER-B-RUN}
  - {name: UNLOADER-C, active_style: UNLOADER-C-RUN}   # drains ASSY-C (CLIP line)
  - {name: UNLOADER-D, active_style: UNLOADER-D-RUN}   # drains ASSY-D (STUD line)

styles:
  - {name: PRESS-1-RUN, process: PRESS-1, payload: PANEL-LH}
  - {name: PRESS-2-RUN, process: PRESS-2, payload: PANEL-RH}
  - {name: PRESS-3-RUN, process: PRESS-3, payload: PANEL-C}
  - {name: PRESS-4-RUN, process: PRESS-4, payload: PANEL-D}
  - {name: WELD-1-RUN, process: WELD-1, payload: ASSY-X}
  - {name: WELD-2-RUN, process: WELD-2, payload: ASSY-Y}
  - {name: WELD-3-RUN, process: WELD-3, payload: ASSY-X}
  - {name: WELD-4-RUN, process: WELD-4, payload: ASSY-C}
  - {name: WELD-5-RUN, process: WELD-5, payload: ASSY-D}
  - {name: LOADER-COMP-RUN, process: LOADER-COMP, payload: BRKT}
  - {name: LOADER-CLIP-RUN, process: LOADER-CLIP, payload: CLIP}
  - {name: LOADER-STUD-RUN, process: LOADER-STUD, payload: STUD}
  - {name: UNLOADER-A-RUN, process: UNLOADER-A, payload: ASSY-X}
  - {name: UNLOADER-B-RUN, process: UNLOADER-B, payload: ASSY-Y}
