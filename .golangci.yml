# golangci-lint configuration for the SHINGO monorepo.
# Targets golangci-lint v2.x syntax (installed: v2.11.4).
#
# Primary guardrail: www handlers must not import *store.DB directly.
# Handlers that currently do are listed under `exclusions.rules` as
# ratcheted exemptions. Each entry comes off the list as its handler is
# migrated off *store.DB during Phase 3 (core) and Phase 4 (edge) of the
# architecture refactor. When the ratcheted-exemption list hits zero, the
# entire `exclusions.rules` block below (except the two permanent
# `engine_iface.go` / `*_test.go` carveouts) can be deleted, leaving the
# rule as a permanent regression guard.

version: "2"

linters:
  # PR 1 is scoped to the depguard guardrail only. Start from zero and
  # enable depguard explicitly, so pre-existing errcheck/staticcheck/unused
  # findings across the repo don't block the PR that lands this config.
  # A follow-up PR can enable the standard linter set and tackle the
  # code-quality backlog as its own tracked piece of work.
  default: none
  enable:
    - depguard
    - forbidigo

  settings:
    forbidigo:
      # State-machine bypass guard (Stage 10 follow-up). Direct calls to
      # the order-status atomic writes must go through
      # dispatch.LifecycleService typed methods. Carveouts for legitimate
      # bypass paths are listed in `exclusions.rules` below alongside the
      # depguard ratchet entries.
      #
      # Text-based matching. The receiver variable is always named `db`
      # in this codebase and only *store.DB has these methods, so
      # matching on `db\.<Method>` is sufficient. forbidigo matches the
      # selector expression (e.g. `db.UpdateOrderStatus`) — do NOT
      # append `\(` because the parenthesis is syntax, not the identifier.
      forbid:
        - pattern: 'db\.UpdateOrderStatus'
          msg: "Direct UpdateOrderStatus calls bypass the state machine. Use dispatch.LifecycleService typed methods (CancelOrder, ConfirmReceipt, Release, MarkInTransit, MarkStaged, MarkDelivered, Queue, MoveToSourcing, Dispatch, Fail, Acknowledge, BeginReshuffle, CompleteCompound, MarkPending). See docs/order-state-machine/transitions.md."
        - pattern: 'db\.FailOrderAtomic'
          msg: "Direct FailOrderAtomic calls bypass the state machine. Use dispatch.LifecycleService.Fail."
        - pattern: 'db\.CancelOrderAtomic'
          msg: "Direct CancelOrderAtomic calls bypass the state machine. Use dispatch.LifecycleService.CancelOrder."

    depguard:
      rules:
        www-no-direct-store:
          list-mode: lax
          files:
            - "**/shingo-core/www/**"
            - "**/shingo-edge/www/**"
          deny:
            - pkg: "shingocore/store"
              desc: "www handlers must use a service interface, not *store.DB directly"
            - pkg: "shingoedge/store"
              desc: "www handlers must use a service interface, not *store.DB directly"

        # ── Phase 6.0c: store sub-package isolation ──────────────────────
        #
        # Each store sub-package owns one aggregate. Cross-aggregate
        # orchestration lives at the outer store/ level (in files like
        # completion.go, station_views.go, station_nodes.go, etc.) which
        # are exempted via the file-pattern below.
        #
        # The allow-list block captures the one legitimate cross-aggregate
        # import: shingo-edge/store/reconciliation/ reads
        # shingo-edge/store/messaging/'s MaxRetries constant when computing
        # pending vs. dead-letter outbox counts.
        store-sub-pkg-isolation:
          list-mode: lax
          files:
            - "**/shingo-core/store/*/**"
            - "**/shingo-edge/store/*/**"
            - "!**/shingo-core/store/internal/**"
            - "!**/shingo-edge/store/internal/**"
          deny:
            - pkg: "shingocore/store/admin"
            - pkg: "shingocore/store/audit"
            - pkg: "shingocore/store/bins"
            - pkg: "shingocore/store/cms"
            - pkg: "shingocore/store/demands"
            - pkg: "shingocore/store/diagnostics"
            - pkg: "shingocore/store/inventory"
            - pkg: "shingocore/store/messaging"
            - pkg: "shingocore/store/nodes"
            - pkg: "shingocore/store/orders"
            - pkg: "shingocore/store/payloads"
            - pkg: "shingocore/store/recovery"
            - pkg: "shingocore/store/registry"
            - pkg: "shingocore/store/scene"
            - pkg: "shingocore/store/schema"
            - pkg: "shingocore/store/telemetry"
            - pkg: "shingoedge/store/admin"
            - pkg: "shingoedge/store/catalog"
            - pkg: "shingoedge/store/counters"
            - pkg: "shingoedge/store/lineside"
            - pkg: "shingoedge/store/orders"
            - pkg: "shingoedge/store/processes"
            - pkg: "shingoedge/store/schema"
            - pkg: "shingoedge/store/shifts"
            - pkg: "shingoedge/store/stations"

  exclusions:
    rules:
      # ---- Structural exemptions (permanent) --------------------------------
      # engine_iface.go is the service-interface definition itself; it must
      # reference store types to define the contract. Test files need store
      # types to build fixtures. Neither category ever migrates off store.
      - path: "shingo-(core|edge)/www/engine_iface\\.go"
        linters:
          - depguard
      - path: "shingo-(core|edge)/www/.*_test\\.go"
        linters:
          - depguard

      # Cross-aggregate exception (Phase 6.0c): both modules' reconciliation
      # packages read the messaging.MaxOutboxRetries constant to compute
      # pending vs. dead-letter outbox counts. The single import is
      # documented at the package level in
      # shingo-(core|edge)/store/reconciliation/reconciliation.go.
      - path: "shingo-(core|edge)/store/reconciliation/.*\\.go"
        linters:
          - depguard

      # ---- State-machine bypass carveouts (forbidigo) ----------------------
      # Each entry below names a file that legitimately bypasses
      # LifecycleService.transition. Document the reason inline before
      # adding to this list. Removable once the bypass is migrated.
      #
      # 1. The driver itself.
      - path: "shingo-core/dispatch/lifecycle\\.go"
        linters:
          - forbidigo
      # 2. Initial-write Pending in the order-intake methods
      #    (CreateInboundOrder, CreateStorageWaybillOrder,
      #    CreateIngestStoreOrder). No source status to validate.
      - path: "shingo-core/dispatch/lifecycle_service\\.go"
        linters:
          - forbidigo
      # 3. Child-intake validation failures in compound order creation
      #    (missing source/dest node) — failure is the intended initial
      #    state, not a transition.
      - path: "shingo-core/dispatch/compound\\.go"
        linters:
          - forbidigo
      # 4. Crash-recovery path for orders stuck in Delivered.
      - path: "shingo-core/engine/reconciliation_service\\.go"
        linters:
          - forbidigo
      # 5. Passthrough wrappers around db.UpdateOrderStatus and
      #    FailOrderAtomic. Slated for removal — callers should go
      #    direct to lifecycle. Carveout removable when the file is
      #    deleted.
      - path: "shingo-core/service/order_service\\.go"
        linters:
          - forbidigo
      # 6. Store-level implementations themselves.
      - path: "shingo-core/store/orders\\.go"
        linters:
          - forbidigo
      # 7. Edge lifecycle driver — equivalent to #1 for the edge module.
      - path: "shingo-edge/orders/lifecycle_service\\.go"
        linters:
          - forbidigo
      # 8. Edge store-level implementation.
      - path: "shingo-edge/store/orders\\.go"
        linters:
          - forbidigo
      # Test files build fixtures by direct DB writes. Permanent.
      - path: ".*_test\\.go"
        linters:
          - forbidigo

      # No ratcheted www-no-direct-store exemptions remain.
      #
      # Stage 2A.2 (2026-04) drained the original 17-file ratchet by
      # extending shingo-core/domain and creating shingo-edge/domain
      # to hold the data types referenced by www handlers. Handlers
      # now import the domain package(s) for type names; the store
      # sub-packages keep `type X = domain.X` aliases so internal
      # store callers compile unchanged. With no remaining
      # exemptions, the www-no-direct-store rule is a permanent
      # architectural guardrail: any new direct
      # shingocore/store or shingoedge/store import inside www/ fails
      # CI and the offending PR has to route through a service
      # interface or domain types.
      #
      # If a future change legitimately needs to bypass the rule —
      # e.g. a temporary migration step — add a new entry here with
      # an inline comment that explains the reason and a removal
      # plan. Do not leave undocumented exemptions.
