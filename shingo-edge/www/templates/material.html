{{template "header" .}}

<div style="display:flex;align-items:center;gap:0.75rem;margin-bottom:0.75rem;flex-wrap:wrap">
    {{if .Processes}}
    <select class="form-input" style="width:16rem" onchange="if(this.value)window.location='?process='+this.value">
        {{range .Processes}}
        <option value="{{.ID}}" {{if eq .ID $.ActiveProcessID}}selected{{end}}>{{.Name}}</option>
        {{end}}
    </select>
    {{end}}
    <span style="margin-left:auto;font-size:0.85rem;color:var(--text-muted)">
        Current: <strong>{{if .CurrentStyle}}{{.CurrentStyle}}{{else}}None{{end}}</strong>
        {{if .TargetStyle}} | Target: <strong>{{.TargetStyle}}</strong>{{end}}
    </span>
</div>

<div id="material-content"
     hx-get="/material/partial?process={{.ActiveProcessID}}"
     hx-trigger="refreshMaterial from:body, sse:order-update throttle:5s, sse:order-completed, sse:order-failed, sse:counter-update throttle:10s"
     hx-swap="innerHTML"
     hx-ext="sse"
     sse-connect="/events">
    {{template "material-body" .}}
</div>

{{template "footer" .}}
