{{template "header" .}}

<div style="display:flex;align-items:center;margin-bottom:0.75rem;flex-wrap:wrap">
    {{if .Processes}}
    <select class="form-input" style="width:14rem" data-action-change="navigateToProcessOrOrders">
        <option value="" {{if eq .ActiveProcessID 0}}selected{{end}}>All Processes</option>
        {{range .Processes}}
        <option value="{{.ID}}" {{if eq .ID $.ActiveProcessID}}selected{{end}}>{{.Name}}</option>
        {{end}}
    </select>
    {{end}}
</div>

<div class="card">
    <div class="card-body"
         id="orders-content"
         hx-get="/orders/partial{{if .ActiveProcessID}}?process={{.ActiveProcessID}}{{end}}"
         hx-trigger="refreshOrders from:body, sse:order-update throttle:3s, sse:order-completed, sse:order-failed"
         hx-swap="innerHTML"
         hx-ext="sse"
         sse-connect="/events">
        {{template "orders-body" .}}
    </div>
</div>

<script type="module" src="/static/js/pages/orders.js?v={{cacheBust}}"></script>

{{template "footer" .}}
