{{template "header" .}}
<style>
    .designer-container { display:flex; height:calc(100vh - 56px); background:#0a0a0a; }
    .palette { width:200px; background:#1a1a1a; border-right:1px solid #333; padding:12px; overflow-y:auto; flex-shrink:0; }
    .palette h3 { color:#aaa; font-size:12px; text-transform:uppercase; letter-spacing:1px; margin:0 0 12px; }
    .palette-item { background:#2a2a2a; border:1px solid #444; border-radius:8px; padding:12px; margin-bottom:8px; cursor:grab; text-align:center; color:#ddd; font-size:13px; transition:border-color .15s; user-select:none; }
    .palette-item:hover { border-color:#00BFFF; }
    .palette-item:active { cursor:grabbing; }
    .palette-item .icon { font-size:28px; display:block; margin-bottom:4px; }
    .canvas-area { flex:1; display:flex; align-items:center; justify-content:center; overflow:hidden; }
    #designer-canvas { border:1px solid #333; }
    #prop-panel { width:280px; background:#1a1a1a; border-left:1px solid #333; padding:16px; overflow-y:auto; flex-shrink:0; display:none; }
    #prop-panel label { display:block; color:#aaa; font-size:12px; margin:10px 0 4px; }
    .prop-input { width:100%; padding:6px 8px; background:#2a2a2a; border:1px solid #444; border-radius:4px; color:#eee; font-size:13px; box-sizing:border-box; }
    .prop-input:focus { outline:none; border-color:#00BFFF; }
    select.prop-input { appearance:auto; }
    .designer-toolbar { display:flex; align-items:center; justify-content:space-between; padding:8px 16px; background:#1a1a1a; border-bottom:1px solid #333; }
    .designer-toolbar .screen-name { background:transparent; border:1px solid #444; border-radius:4px; padding:4px 8px; color:#eee; font-size:14px; width:250px; }
    .designer-toolbar .screen-name:focus { border-color:#00BFFF; outline:none; }
    .btn-save { background:#1976D2; color:#fff; border:none; border-radius:4px; padding:6px 16px; font-size:13px; cursor:pointer; }
    .btn-save:hover { background:#1565C0; }
    .btn-danger { background:#D32F2F; color:#fff; border:none; border-radius:4px; padding:6px 12px; font-size:12px; cursor:pointer; width:100%; }
    .btn-danger:hover { background:#B71C1C; }
    .toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); padding:10px 24px; border-radius:6px; color:#fff; font-size:14px; z-index:9999; animation:toastIn .3s ease, toastOut .3s ease 2.7s; }
    .toast-success { background:#388E3C; } .toast-error { background:#D32F2F; }
    @keyframes toastIn { from { opacity:0; transform:translateX(-50%) translateY(20px); } }
    @keyframes toastOut { to { opacity:0; transform:translateX(-50%) translateY(20px); } }
</style>

<div class="designer-toolbar">
    <input type="text" class="screen-name" id="screen-name" value="{{if .Screen}}{{.Screen.Name}}{{else}}New Operator Screen{{end}}" placeholder="Screen name" />
    <button class="btn-save" onclick="window._designerSave()">Save Screen (Ctrl+S)</button>
</div>

<div class="designer-container">
    <div class="palette">
        <h3>Elements</h3>
        <div class="palette-item" draggable="true" data-type="ordercombo"><span class="icon">&#9634;</span>Order Combo</div>
        <div class="palette-item" draggable="true" data-type="header"><span class="icon">&#9776;</span>Header</div>
        <div class="palette-item" draggable="true" data-type="statusbar"><span class="icon">&#9644;</span>Status Bar</div>
        <div class="palette-item" draggable="true" data-type="label"><span class="icon">A</span>Label</div>
    </div>
    <div class="canvas-area"><canvas id="designer-canvas" width="1920" height="1080"></canvas></div>
    <div id="prop-panel"></div>
</div>

<script type="module">
    import { initDesigner } from '/static/operator-canvas/designer.js';
    const screenData = {{if .Screen}}{{.Screen | json}}{{else}}null{{end}};
    const payloadList = {{.Payloads | json}};
    const lineList = {{.Lines | json}};
    initDesigner(document.getElementById('designer-canvas'), screenData, payloadList, lineList);
    document.getElementById('screen-name').addEventListener('change', function() { window._designerState.screenName = this.value; });
</script>
{{template "footer" .}}
