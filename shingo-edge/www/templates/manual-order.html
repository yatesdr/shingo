{{template "header" .}}

<div class="page-header">
    <h1>Manual Order</h1>
    <button class="btn btn-secondary" onclick="syncNodes()" id="sync-nodes-btn" title="Re-fetch node list from core">Sync Nodes</button>
</div>

<div class="card" style="max-width:600px;margin:0 auto">
    <div class="card-header"><strong>Manual Order</strong></div>
    <div class="card-body">
        <div class="form-group">
            <label>Order Type</label>
            <select id="mo-type" class="form-input" onchange="updateOrderForm()">
                <option value="retrieve">Retrieve</option>
                <option value="store">Store</option>
                <option value="move">Move</option>
                <option value="complex">Complex (Dwell)</option>
            </select>
        </div>
        <div class="form-group">
            <label>Payload</label>
            <select id="mo-payload" class="form-input" onchange="autofillPayloadNodes()">
                <option value="">-- Select --</option>
                {{range .Payloads}}
                <option value="{{.ID}}" data-location="{{.Location}}" data-staging="{{.StagingNode}}" data-retrieve-empty="{{.RetrieveEmpty}}">{{.Description}} ({{.Location}})</option>
                {{end}}
            </select>
        </div>
        <div class="form-group">
            <label>Quantity</label>
            <input type="number" id="mo-qty" class="form-input" value="1" min="1">
        </div>
        <div class="form-group" id="mo-pickup-group" style="display:none">
            <label id="mo-pickup-label">Pickup Node</label>
            <select id="mo-pickup" class="form-input">
                <option value="">-- Select --</option>
            </select>
        </div>
        <div class="form-group" id="mo-delivery-group">
            <label id="mo-delivery-label">Delivery Node</label>
            <select id="mo-delivery" class="form-input">
                <option value="">-- Select --</option>
            </select>
        </div>
        <div class="form-group" id="mo-staging-group" style="display:none">
            <label>Staging Node</label>
            <select id="mo-staging" class="form-input">
                <option value="">-- Select --</option>
            </select>
        </div>
        <div style="text-align:right;margin-top:0.75rem">
            <button class="btn btn-primary" onclick="createOrder()">Create Order</button>
        </div>
    </div>
</div>

<div id="page-data"
     data-nodes='{{.NodesJSON}}'
     data-core-nodes='{{.CoreNodesJSON}}'>
</div>
<script src="/static/js/pages/manual-order.js"></script>

{{template "footer" .}}
