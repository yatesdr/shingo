{{template "header" .}}

<div style="display:flex;align-items:center;margin-bottom:0.75rem;flex-wrap:wrap;gap:0.75rem">
    {{if .Processes}}
    <select class="form-input" style="width:14rem" id="prod-line-select" onchange="onProdLineChange()">
        {{range .Processes}}
        <option value="{{.ID}}" {{if eq .ID $.ActiveProcessID}}selected{{end}}>{{.Name}}</option>
        {{end}}
    </select>
    {{end}}

    <div style="display:flex;align-items:center;gap:0.35rem">
        <button class="btn btn-sm" onclick="changeDate(-1)" title="Previous day">&larr;</button>
        <input type="date" id="prod-date" class="form-input" style="width:10rem" value="{{.Date}}" onchange="onProdDateChange()">
        <button class="btn btn-sm" onclick="changeDate(1)" title="Next day">&rarr;</button>
    </div>

    <span id="style-toggle" onclick="cycleStyle()" style="margin-left:auto;font-size:0.85rem;cursor:pointer;user-select:none" title="Click to cycle styles">
        {{if .FilterStyleName}}
            Job Style: <strong>{{.FilterStyleName}}</strong>
        {{else}}
            Job Style: <strong>All</strong>
        {{end}}
    </span>
</div>

<div class="card">
    <div class="card-body" style="overflow-x:auto">
        <table class="table" id="production-table">
            <thead id="production-thead"></thead>
            <tbody id="production-tbody"></tbody>
        </table>
        {{if not .Shifts}}
        <p class="empty-cell">No shifts configured. Go to <a href="/config">Config</a> to define shifts.</p>
        {{end}}
    </div>
</div>

<div id="page-data"
     data-shifts='{{.ShiftsJSON}}'
     data-hourly-counts='{{.HourlyCountsJSON}}'
     data-styles='{{.StylesJSON}}'
     data-active-line-id="{{.ActiveProcessID}}"
     data-filter-style-id="{{.FilterStyleID}}"
     data-date="{{.Date}}">
</div>
<script src="/static/js/pages/production.js"></script>

{{template "footer" .}}
