<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{{.Screen.Name}} - Bin Loader</title>
    <link rel="stylesheet" href="/static/css/operator-station.css?v={{cacheBust}}">
    <link rel="stylesheet" href="/static/js/pages/bin-loader.css?v={{cacheBust}}">
</head>
<body class="bin-loader">
    <div id="bin-loader-header" class="bl-header">
        <div class="bl-header-left">
            <h1 id="bl-screen-name">{{.Screen.Name}}</h1>
        </div>
        <div class="bl-header-right">
            <button id="bl-changeover-btn" class="bl-header-btn">CHANGEOVER</button>
            <button id="bl-refresh-btn" class="bl-header-btn">REFRESH</button>
        </div>
    </div>

    <div id="bin-loader-grid" class="bl-grid"></div>

    <!-- Changeover Modal -->
    <div id="bl-changeover-modal" class="bl-modal">
        <div class="bl-modal-content">
            <div class="bl-modal-title">Changeover - Select Payload</div>
            <div class="bl-payload-grid" id="bl-payload-grid"></div>
            <div class="bl-modal-actions">
                <button class="bl-modal-btn bl-modal-btn-cancel" id="bl-cancel-btn">CANCEL</button>
                <button class="bl-modal-btn bl-modal-btn-confirm" id="bl-confirm-btn" disabled>CONFIRM CHANGEOVER</button>
            </div>
        </div>
    </div>

    <script type="module" src="/static/js/pages/bin-loader.js?v={{cacheBust}}"></script>
</body>
</html>
