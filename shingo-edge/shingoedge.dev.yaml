# shingoedge.dev.yaml — LOCAL DEV / SIMULATION ONLY. NOT FOR PRODUCTION.
# Loaded by a shingoedge built with -tags sim; refuses to start without
# SHINGO_ALLOW_SIM=1 (T0.3). warlink.enabled:false on purpose — sim mode starts
# the poll loop explicitly against the fake WarLink (T1.3). Station = devplant.line1.
namespace: devplant
line_id: line1
database_path: /data/shingoedge.db
core_api: http://core:8083

# Multi-window loader delivery (C4). On: a shared_window loader spreads its empties
# across its window homes (budget = window count, round-robin to free windows, never
# 2N). Off (production default): empties funnel to the loader's anchor, budget 1 —
# behaviour-identical to the pre-multi-window resolver. The dev sim turns it on so
# the demo's 3-window PLK_001 exercises the spread; flipping it changes only loaders
# actually configured with window homes.
loaders_multi_window: true

warlink:
  enabled: false                    # sim starts the poller explicitly (T1.3); HMI apply is ignored in sim (F2)
  mode: poll

web:
  host: 0.0.0.0
  port: 8081
  session_secret: dev-only-not-a-real-secret

messaging:
  kafka:
    brokers:
      - kafka:9092
  dispatch_topic: shingo.dispatch
  orders_topic: shingo.orders
  outbox_drain_interval: 5s

sim:
  enabled: true
  seed: 1
  speed: 10.0                       # running clock: 10× wall. Change live in the dev top-strip / POST /api/sim/speed. Must match core.
  # Synced fast-forward (zero core↔edge drift) — MUST match shingocore.dev.yaml EXACTLY.
  # See that file for the rationale: running-clock mode drifts (boot-skew × speed → expired
  # message drops); epoch + this shared anchor lock both clocks to one timeline.
  epoch: 2026-07-12T02:30:00Z
  anchor_wall: 2026-07-12T02:30:00Z
  # plc_name/tag_name MUST exactly match the reporting_points the seed tool
  # creates. This list is the source of truth for those names.
  # Rate parity (the anti-starvation core): each press feeds exactly one weld, so press
  # rate = weld rate = 6/min (10s tick, 1 uop/tick). The supermarket is pure decoupling
  # headroom — it sits mid-level, neither pinning full (no overfill jam) nor draining dry
  # (no weld starvation). BRKT has no PLC (loader-fed; WELD-2 drains it at 6/min). Verify
  # with `make dev-rates` (the fill/starve helper).
  processes:
    - plc_name: PRESS-1
      tag_name: PRESS-1_COUNTER
      tick_interval: 10s
      uop_per_tick: 1
    - plc_name: PRESS-2
      tag_name: PRESS-2_COUNTER
      tick_interval: 10s
      uop_per_tick: 1
    - plc_name: WELD-1
      tag_name: WELD-1_COUNTER
      tick_interval: 10s
      uop_per_tick: 1
    - plc_name: WELD-2
      tag_name: WELD-2_COUNTER
      tick_interval: 10s
      uop_per_tick: 1
    # Component-leg drains (loader-fed, 6/min each): WELD-3 drains CLIP (single-window
    # loader leg), WELD-4 drains STUD (dedicated loader leg). Same rate as the loaders
    # supply so the component markets stay mid-level.
    - plc_name: WELD-3
      tag_name: WELD-3_COUNTER
      tick_interval: 10s
      uop_per_tick: 1
    - plc_name: WELD-4
      tag_name: WELD-4_COUNTER
      tick_interval: 10s
      uop_per_tick: 1
  operators:
    enabled: true
    loader_auto_load: 5s
    unloader_auto_clear: 8s
    changeover_auto_cutover: true
    cutover_delay: 10s
  # Downtime model v1 (G9, §3.1): clustered random outages.
  # Per-machine 85% availability via exponential TBF + bounded MTTR.
  # Produces realistic clustering (good weeks / bad weeks) for OEE.
  downtime:
    enabled: true                     # ON for long-run/OEE realism (85% avail, clustered outages)
    machines:
      - plc_name: PRESS-1
        availability: 0.85
        min_mttr: 5m
        max_mttr: 30m
      - plc_name: PRESS-2
        availability: 0.85
        min_mttr: 5m
        max_mttr: 30m
      - plc_name: WELD-1
        availability: 0.85
        min_mttr: 5m
        max_mttr: 30m
      - plc_name: WELD-2
        availability: 0.85
        min_mttr: 5m
        max_mttr: 30m
      - plc_name: WELD-3
        availability: 0.85
        min_mttr: 5m
        max_mttr: 30m
      - plc_name: WELD-4
        availability: 0.85
        min_mttr: 5m
        max_mttr: 30m
